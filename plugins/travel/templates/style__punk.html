{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
  --color-bg: #f3efe2;
  --color-surface: #ffffff;
  --color-primary: #d6001c;
  --color-secondary: #1a1a1a;
  --color-accent: #c6ff00;
  --color-text: #1a1a1a;
  --color-text-secondary: #3d3d3d;
  --color-text-heading: #000000;
  --color-border: #1a1a1a;
  --color-shadow: rgba(0,0,0,0.8);
  --font-heading: 'Noto Sans SC', 'Arial Black', 'Impact', sans-serif;
  --font-body: 'Noto Serif SC', 'Times New Roman', serif;
  --font-mono: 'Courier New', monospace;
  --font-size-h1: 3rem;
  --font-size-h2: 2rem;
  --font-size-h3: 1.4rem;
  --font-size-body: 1rem;
  --font-size-small: 0.85rem;
  --line-height: 1.45;
  --space-xs: 0.25rem;
  --space-sm: 0.5rem;
  --space-md: 1rem;
  --space-lg: 1.5rem;
  --space-xl: 2rem;
  --space-xxl: 3rem;
  --radius-sm: 0;
  --radius-md: 0;
  --radius-lg: 0;
  --transition-fast: 0.1s ease;
  --transition-normal: 0.2s ease;
}
</style>
{% endblock %}

{% block style_css %}
<style>
/* 限制主容器宽度，避免桌面端铺满全屏 */
main, .container, .max-w-2xl {
  max-width: 720px;
  margin: 0 auto;
}

/* 全局粗糙纸张纹理——扫描线 + 随机噪点 */
.hero,
.day-card,
.budget-section,
.xhs-section,
.tips-section,
.emergency-section,
.packing-section,
footer {
  background-color: var(--color-bg);
  background-image: 
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180,180,180,0.08) 2px, rgba(180,180,180,0.08) 4px),
    radial-gradient(circle at 30% 45%, rgba(0,0,0,0.05) 1px, transparent 1px),
    radial-gradient(circle at 70% 80%, rgba(0,0,0,0.04) 2px, transparent 2px);
  background-size: 100% 4px, 60px 60px, 80px 80px;
}

/* ---------- Hero 封面 ---------- */
.hero {
  position: relative;
  overflow: hidden;
  padding: var(--space-xxl) var(--space-lg);
  border-bottom: 4px solid var(--color-border);
  box-shadow: inset 0 -10px 0 -5px var(--color-primary);
  background-blend-mode: multiply;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h1);
  font-weight: 900;
  text-transform: uppercase;
  color: #fff;
  -webkit-text-stroke: 2.5px var(--color-text-heading);
  text-stroke: 2.5px var(--color-text-heading);
  letter-spacing: -0.02em;
  line-height: 1.1;
  text-shadow: 4px 4px 0 var(--color-primary);
  margin-bottom: var(--space-md);
}
.hero .subtitle {
  display: inline-block;
  background: var(--color-primary);
  color: #fff;
  font-family: var(--font-heading);
  font-weight: bold;
  padding: var(--space-xs) var(--space-md);
  transform: skewX(-8deg);
  letter-spacing: 0.05em;
  font-size: var(--font-size-small);
  margin-bottom: var(--space-lg);
}
.weather-overview,
.budget-overview {
  display: inline-block;
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  padding: var(--space-sm) var(--space-md);
  font-family: var(--font-body);
  font-size: var(--font-size-small);
  box-shadow: 3px 3px 0 var(--color-shadow);
  margin-right: var(--space-sm);
  margin-bottom: var(--space-sm);
  position: relative;
}
.weather-overview::before,
.budget-overview::before {
  content: "★";
  color: var(--color-primary);
  font-size: 1rem;
  margin-right: 0.3em;
}

/* Hero 装饰元素 */
.tape {
  position: absolute;
  background: rgba(255, 255, 220, 0.92);
  border: 1px solid rgba(0,0,0,0.25);
  transform: rotate(-3deg);
  z-index: 2;
}
.tape-1 { top: 15px; left: -5px; width: 90px; height: 25px; transform: rotate(-5deg); }
.tape-2 { bottom: 20px; right: 10px; width: 100px; height: 28px; transform: rotate(4deg); }
.tape-3 { top: 60px; right: 20px; width: 70px; height: 22px; transform: rotate(-8deg); }
.safety-pin {
  position: absolute;
  top: 10px;
  right: 40px;
  font-size: 2.2rem;
  color: var(--color-secondary);
  transform: rotate(15deg);
  z-index: 2;
  filter: drop-shadow(1px 2px 0 var(--color-primary));
}
.stamp {
  position: absolute;
  bottom: 15px;
  left: 25px;
  font-family: var(--font-heading);
  font-weight: 900;
  font-size: 1.8rem;
  color: rgba(200,0,0,0.7);
  border: 3px solid rgba(200,0,0,0.7);
  padding: 0 var(--space-sm);
  transform: rotate(-12deg);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  z-index: 2;
}
.graffiti {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 1.2rem;
  font-weight: bold;
  color: var(--color-accent);
  text-shadow: 1px 1px 0 #000;
  transform: rotate(-5deg);
}
.graffiti-1 { top: 40%; left: 5%; }
.graffiti-2 { bottom: 25%; right: 8%; color: var(--color-primary); font-size: 1.5rem; }

/* ---------- Day 卡片 ---------- */
.day-card {
  position: relative;
  background: var(--color-surface);
  border: 3px solid var(--color-border);
  padding: var(--space-xl) var(--space-lg);
  margin: var(--space-xxl) var(--space-md);
  box-shadow: 8px 8px 0 rgba(0,0,0,0.8);
  overflow: visible;
}
/* 胶带与叉叉 */
.day-card::before {
  content: '';
  position: absolute;
  top: -12px;
  left: 15px;
  width: 110px;
  height: 24px;
  background: repeating-linear-gradient(45deg, #cfcfcf, #cfcfcf 3px, #e8e8e8 3px, #e8e8e8 6px);
  border: 1px solid #999;
  transform: rotate(2deg);
  z-index: 5;
}
.day-card::after {
  content: '✕';
  position: absolute;
  top: -18px;
  right: 20px;
  font-size: 2.8rem;
  font-weight: bold;
  color: var(--color-primary);
  transform: rotate(12deg);
  opacity: 0.9;
  z-index: 5;
  text-shadow: 2px 2px 0 #000;
}
.day-card h2 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h2);
  font-weight: 900;
  text-transform: uppercase;
  background: var(--color-primary);
  color: #fff;
  display: inline-block;
  padding: 0.1em 0.6em;
  transform: skewX(-6deg);
  margin-bottom: var(--space-md);
  letter-spacing: 0.03em;
  box-shadow: 4px 4px 0 #000;
}
.day-theme {
  display: inline-block;
  background: var(--color-accent);
  color: #000;
  font-family: var(--font-heading);
  font-weight: bold;
  font-size: var(--font-size-small);
  padding: 0.2em 0.8em;
  transform: rotate(-1deg);
  margin-left: var(--space-sm);
  border: 1px solid #000;
}
.weather-badge {
  background: var(--color-secondary);
  color: #fff;
  padding: var(--space-xs) var(--space-sm);
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  display: inline-block;
  margin-bottom: var(--space-md);
  border: 1px dashed var(--color-accent);
}

/* ---------- 活动项 ---------- */
.activity-item {
  position: relative;
  padding-left: 2.2rem;
  margin-bottom: var(--space-lg);
  border-left: 3px dotted var(--color-primary);
}
.activity-item::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 0.5em;
  width: 12px;
  height: 12px;
  background: var(--color-primary);
  transform: rotate(45deg);
  border: 2px solid #000;
}
.activity-item h3 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h3);
  font-weight: 800;
  color: var(--color-text-heading);
  margin-bottom: var(--space-xs);
}
.activity-order {
  font-family: var(--font-mono);
  background: #000;
  color: #fff;
  padding: 0.1em 0.5em;
  font-size: var(--font-size-small);
  margin-right: var(--space-xs);
}
.activity-time {
  font-weight: bold;
  color: var(--color-primary);
  background: var(--color-accent);
  padding: 0.05em 0.4em;
  display: inline-block;
}
.activity-desc {
  font-family: var(--font-body);
  color: var(--color-text);
  line-height: var(--line-height);
  margin: var(--space-sm) 0;
}
.activity-location a {
  color: var(--color-primary);
  font-weight: bold;
  text-decoration: underline wavy var(--color-secondary);
}
.transport-info,
.meal-info {
  font-size: var(--font-size-small);
  background: #f0f0f0;
  padding: var(--space-xs) var(--space-sm);
  border: 1px solid #aaa;
  display: inline-block;
  margin-right: var(--space-xs);
  transform: rotate(-0.5deg);
}

/* 地图（不可使用滤镜） */
.day-map {
  border: 2px solid var(--color-border);
  box-shadow: 4px 4px 0 rgba(0,0,0,0.7);
  margin-top: var(--space-md);
  width: 100%;
  height: 200px;
}

/* 酒店信息 */
.hotel-info {
  background: repeating-linear-gradient(45deg, #eee, #eee 10px, #ddd 10px, #ddd 20px);
  padding: var(--space-md);
  border: 2px dashed var(--color-secondary);
  font-family: var(--font-body);
  margin-top: var(--space-md);
}

/* ---------- 预算区域 ---------- */
.budget-section {
  padding: var(--space-xl) var(--space-md);
  border-top: 5px solid var(--color-border);
}
.budget-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}
.budget-item {
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  padding: var(--space-md);
  box-shadow: 5px 5px 0 var(--color-primary);
  font-family: var(--font-mono);
  transform: rotate(-0.8deg);
}
.budget-item:nth-child(even) {
  transform: rotate(1deg);
}
.budget-total {
  font-family: var(--font-heading);
  font-weight: 900;
  font-size: var(--font-size-h3);
  text-align: right;
  background: var(--color-secondary);
  color: #fff;
  padding: var(--space-sm) var(--space-lg);
  margin-top: var(--space-md);
  display: inline-block;
  transform: skewX(-5deg);
  border: 2px solid var(--color-accent);
}

/* ---------- 小红书攻略 ---------- */
.xhs-section {
  padding: var(--space-xl) var(--space-md);
}
.xhs-note {
  background: var(--color-surface);
  border-left: 6px solid var(--color-primary);
  padding: var(--space-md) var(--space-lg);
  margin-bottom: var(--space-lg);
  box-shadow: 6px 6px 0 rgba(0,0,0,0.6);
  position: relative;
}
.xhs-note::before {
  content: '📌';
  position: absolute;
  top: -15px;
  left: -10px;
  font-size: 2rem;
  filter: drop-shadow(2px 2px 0 var(--color-primary));
  transform: rotate(-10deg);
}
.xhs-note h3 {
  font-family: var(--font-heading);
  font-weight: 800;
  text-transform: uppercase;
  color: var(--color-primary);
}

.xhs-note p[style*="color"] {
  color: var(--color-primary) !important;
}

/* ---------- 旅行贴士 ---------- */
.tips-section {
  padding: var(--space-xl) var(--space-md);
}
.tips-section ul {
  list-style: none;
  padding: 0;
}
.tips-section li {
  position: relative;
  padding-left: 2rem;
  margin-bottom: var(--space-md);
  font-family: var(--font-body);
  font-size: var(--font-size-body);
  line-height: var(--line-height);
  border-bottom: 1px dashed var(--color-secondary);
}
.tips-section li::before {
  content: '✗';
  color: var(--color-primary);
  font-weight: bold;
  font-size: 1.4rem;
  position: absolute;
  left: 0;
  top: -0.1em;
}

/* ---------- 紧急信息 ---------- */
.emergency-section {
  background: repeating-linear-gradient(45deg, #ffe6e6, #ffe6e6 15px, #fcdcdc 15px, #fcdcdc 30px);
  border: 3px solid var(--color-primary);
  padding: var(--space-lg);
  margin: var(--space-xl) var(--space-md);
  font-family: var(--font-heading);
  color: #900;
}
.emergency-section h3 {
  color: var(--color-primary);
  font-size: var(--font-size-h3);
  text-transform: uppercase;
  border-bottom: 2px solid var(--color-primary);
  display: inline-block;
}

/* ---------- 行李清单 ---------- */
.packing-section {
  padding: var(--space-xl) var(--space-md);
}
.packing-section ul {
  list-style: none;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
}
.packing-section li {
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  padding: var(--space-sm) var(--space-md);
  margin: var(--space-xs);
  font-family: var(--font-mono);
  transform: rotate(-1deg);
  box-shadow: 3px 3px 0 var(--color-shadow);
}
.packing-section li::before {
  content: '☐ ';
  color: var(--color-primary);
}

/* ---------- 页脚 ---------- */
footer {
  background: var(--color-secondary);
  color: #fff;
  text-align: center;
  padding: var(--space-xl);
  border-top: 6px dashed var(--color-accent);
  position: relative;
  font-family: var(--font-mono);
}
footer .verification-badge {
  border: 2px solid var(--color-accent);
  padding: var(--space-sm) var(--space-md);
  display: inline-block;
  margin-top: var(--space-md);
  font-weight: bold;
  background: #000;
}
.footer-decor {
  position: absolute;
  top: -20px;
  right: 20px;
  font-size: 2.5rem;
  color: var(--color-primary);
  transform: rotate(5deg);
}

/* 可信度徽章 */
.verification-badge.community-match {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  font-family: var(--font-heading);
  font-size: var(--font-size-small);
  font-weight: bold;
  background: #000;
  color: var(--color-accent);
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--color-primary);
  transform: rotate(-1deg);
  box-shadow: 3px 3px 0 var(--color-primary);
}
.verification-badge.community-only {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  background: var(--color-surface);
  color: var(--color-text-secondary);
  padding: var(--space-xs) var(--space-sm);
  border: 1px dashed var(--color-border);
  transform: rotate(0.5deg);
}

/* 响应式微调 */
@media (max-width: 672px) {
  .hero h1 {
    font-size: 2.4rem;
  }
  .budget-grid {
    grid-template-columns: 1fr;
  }
}
</style>
{% endblock %}

{% block header_decor %}
<div class="tape tape-1"></div>
<div class="tape tape-2"></div>
<div class="tape tape-3"></div>
<div class="safety-pin"><i class="fa-solid fa-thumbtack"></i></div>
<div class="stamp">ZINE</div>
<div class="graffiti graffiti-1">NO FUTURE</div>
<div class="graffiti graffiti-2">PUNK'S NOT DEAD</div>
{% endblock %}

{% block footer_decor %}
<div class="footer-decor"><i class="fa-solid fa-skull"></i></div>
{% endblock %}
