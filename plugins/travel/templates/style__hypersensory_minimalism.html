{% extends "base.html" %}

{% block style_vars %}
<style>
    :root {
        /* === 超感官极简主义配色 === */
        --color-bg: #FAFAFA;
        --color-surface: #FFFFFF;
        --color-primary: #1A1A1A;
        --color-secondary: #6E6E6E;
        --color-accent: #A3A3A3;
        --color-text: #2B2B2B;
        --color-text-secondary: #8A8A8A;
        --color-text-heading: #111111;
        --color-border: #E8E8E8;
        --color-shadow: rgba(0, 0, 0, 0.04);

        /* === 字体系统 === */
        --font-heading: 'Noto Sans SC', 'PingFang SC', -apple-system, system-ui, sans-serif;
        --font-body: 'Noto Sans SC', 'PingFang SC', -apple-system, system-ui, sans-serif;
        --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;

        /* === 数学比例字号（根号2比例：1.414） === */
        --font-size-h1: 2.369rem;
        --font-size-h2: 1.618rem;
        --font-size-h3: 1.125rem;
        --font-size-body: 0.9375rem;
        --font-size-small: 0.8125rem;

        /* === 黄金比例行高 === */
        --line-height: 1.618;

        /* === 8px基准间距系统 === */
        --space-xs: 0.25rem;
        --space-sm: 0.5rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2.5rem;
        --space-xxl: 4rem;

        /* === 微圆角 === */
        --radius-sm: 1px;
        --radius-md: 2px;
        --radius-lg: 4px;

        /* === 缓慢过渡（超感官特质） === */
        --transition-fast: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        --transition-normal: 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
</style>
{% endblock %}

{% block style_css %}
<style>
    /* === 容器宽度约束 === */
    main,
    .container,
    .max-w-2xl {
        max-width: 720px;
        margin: 0 auto;
    }

    /* === 页面基底：纯白背景 + 超感官微纹理 === */
    body {
        background-color: #FAFAFA;
        background-image:
            /* 纸张纤维纹理 —— 几乎不可见 */
            repeating-linear-gradient(0deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.004) 3px,
                rgba(0, 0, 0, 0.004) 3.5px),
            /* 微妙光影 —— 模拟自然光下的纸面 */
            radial-gradient(ellipse at 25% 15%, rgba(0, 0, 0, 0.010) 0%, transparent 55%),
            radial-gradient(ellipse at 72% 58%, rgba(0, 0, 0, 0.007) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 85%, rgba(0, 0, 0, 0.005) 0%, transparent 45%);
        background-attachment: fixed;
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        line-height: var(--line-height);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: 0.01em;
    }

    /* === Hero 封面区 === */
    .hero {
        position: relative;
        background-color: var(--color-surface);
        padding: var(--space-xxl) var(--space-xl) var(--space-xl);
        text-align: center;
        border-bottom: 0.5px solid var(--color-border);
        overflow: hidden;
    }

    /* Hero 顶部极细装饰线 */
    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 0.5px;
        background-color: var(--color-primary);
        opacity: 0.25;
    }

    /* Hero 底部微妙几何标记 */
    .hero::after {
        content: '';
        position: absolute;
        bottom: var(--space-lg);
        left: 50%;
        transform: translateX(-50%);
        width: 4px;
        height: 4px;
        background-color: var(--color-primary);
        opacity: 0.12;
        border-radius: 0;
    }

    .hero h1 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h1);
        font-weight: 200;
        letter-spacing: 0.12em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-sm) 0;
        line-height: 1.15;
        text-transform: none;
    }

    .hero .subtitle {
        font-family: var(--font-heading);
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.18em;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        margin-bottom: var(--space-lg);
    }

    .hero .weather-overview,
    .hero .budget-overview {
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.05em;
        color: var(--color-secondary);
        display: inline-block;
        margin: 0 var(--space-sm);
        position: relative;
    }

    .hero .weather-overview::after {
        content: '';
        position: absolute;
        right: calc(-1 * var(--space-sm) - 0.5px);
        top: 50%;
        transform: translateY(-50%);
        width: 0.5px;
        height: 10px;
        background-color: var(--color-border);
    }

    /* === Day Card 每日行程卡片 === */
    .day-card {
        position: relative;
        background-color: var(--color-surface);
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-xl) var(--space-lg) var(--space-lg);
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        transition: box-shadow var(--transition-fast), border-color var(--transition-fast);
        overflow: visible;
    }

    /* 左侧极细竖线 —— 呼应Hero的几何精确性 */
    .day-card::before {
        content: '';
        position: absolute;
        left: var(--space-lg);
        top: var(--space-xl);
        bottom: var(--space-lg);
        width: 1px;
        background: linear-gradient(to bottom,
                rgba(0, 0, 0, 0.10) 0%,
                rgba(0, 0, 0, 0.04) 60%,
                transparent 100%);
        pointer-events: none;
    }

    /* 悬停时极其微妙的阴影浮现 */
    .day-card:hover {
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.025), 0 0 0 1px rgba(0, 0, 0, 0.015);
        border-color: #E0E0E0;
    }

    .day-card h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 200;
        letter-spacing: 0.10em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-xs) 0;
        padding-left: var(--space-lg);
        position: relative;
    }

    /* 标题前的极细微几何标记 */
    .day-card h2::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 6px;
        height: 0.5px;
        background-color: var(--color-accent);
    }

    .day-card .day-theme {
        font-family: var(--font-heading);
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.08em;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-lg);
        padding-left: var(--space-lg);
    }

    .day-card .weather-badge {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 300;
        letter-spacing: 0.04em;
        color: var(--color-secondary);
        padding: 2px 10px;
        border: 0.5px solid var(--color-border);
        border-radius: 0;
        background-color: #FCFCFC;
        margin-bottom: var(--space-md);
        margin-left: var(--space-lg);
        transition: background-color var(--transition-fast);
    }

    /* === Activity Item 活动项 === */
    .activity-item {
        position: relative;
        padding: var(--space-md) 0 var(--space-md) var(--space-lg);
        margin-left: 0;
        border-bottom: 0.5px solid rgba(0, 0, 0, 0.04);
        transition: background-color var(--transition-fast);
        margin-bottom: 0;
    }

    .activity-item:last-child {
        border-bottom: none;
    }

    .activity-item:hover {
        background-color: rgba(0, 0, 0, 0.008);
    }

    .activity-item h3 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h3);
        font-weight: 300;
        letter-spacing: 0.04em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-xs) 0;
        line-height: 1.4;
    }

    .activity-item .activity-order {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 300;
        letter-spacing: 0.06em;
        color: var(--color-accent);
        position: absolute;
        left: 0;
        top: var(--space-md);
        opacity: 0.6;
    }

    .activity-item .activity-time {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-xs);
    }

    .activity-item .activity-desc {
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.02em;
        color: var(--color-secondary);
        line-height: 1.7;
        margin-bottom: var(--space-sm);
    }

    .activity-item .activity-location {
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-xs);
    }

    .activity-item .activity-location a {
        color: var(--color-text);
        text-decoration: none;
        border-bottom: 0.5px solid transparent;
        transition: border-color var(--transition-fast), color var(--transition-fast);
        padding-bottom: 1px;
    }

    .activity-item .activity-location a:hover {
        border-bottom-color: var(--color-accent);
        color: var(--color-text-heading);
    }

    .activity-item .transport-info,
    .activity-item .meal-info {
        font-family: var(--font-body);
        font-size: 0.75rem;
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text-secondary);
        margin-top: var(--space-xs);
        display: inline-block;
        margin-right: var(--space-md);
        position: relative;
        padding-left: 14px;
    }

    .activity-item .transport-info::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 5px;
        height: 0.5px;
        background-color: var(--color-accent);
    }

    .activity-item .meal-info::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 4px;
        border: 0.5px solid var(--color-accent);
        border-radius: 0;
        background: transparent;
    }

    /* === Day Map === */
    .day-map {
        width: 100%;
        height: 200px;
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-md);
        overflow: hidden;
        margin-top: var(--space-lg);
        margin-left: var(--space-lg);
        width: calc(100% - var(--space-lg));
        background-color: #F9F9F9;
    }

    /* === Hotel Info === */
    .hotel-info {
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text-secondary);
        margin-top: var(--space-md);
        margin-left: var(--space-lg);
        padding: var(--space-sm) 0;
        border-top: 0.5px solid rgba(0, 0, 0, 0.04);
    }

    /* === Budget Section 预算明细 === */
    .budget-section {
        background-color: var(--color-surface);
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-xl) var(--space-lg);
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        position: relative;
        overflow: hidden;
    }

    /* 预算区顶部极细装饰线 */
    .budget-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: var(--space-lg);
        right: var(--space-lg);
        height: 0.5px;
        background-color: var(--color-primary);
        opacity: 0.10;
    }

    /* 预算区角落微妙标记 */
    .budget-section::after {
        content: '';
        position: absolute;
        bottom: var(--space-lg);
        right: var(--space-lg);
        width: 8px;
        height: 0.5px;
        background-color: var(--color-accent);
        opacity: 0.3;
    }

    .budget-section h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 200;
        letter-spacing: 0.10em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-lg) 0;
        position: relative;
        display: inline-block;
    }

    .budget-section h2::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 0.5px;
        background-color: var(--color-border);
    }

    .budget-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-md) var(--space-lg);
        margin-top: var(--space-md);
    }

    .budget-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: var(--space-sm) 0;
        border-bottom: 0.5px solid rgba(0, 0, 0, 0.03);
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text);
        transition: color var(--transition-fast);
    }

    .budget-item:hover {
        color: var(--color-text-heading);
    }

    .budget-item .budget-amount {
        font-family: var(--font-mono);
        font-weight: 300;
        letter-spacing: 0.02em;
        color: var(--color-text-heading);
    }

    .budget-total {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: var(--space-md);
        padding-top: var(--space-md);
        border-top: 1px solid var(--color-border);
        font-family: var(--font-heading);
        font-size: var(--font-size-h3);
        font-weight: 300;
        letter-spacing: 0.06em;
        color: var(--color-text-heading);
    }

    /* === XHS Section 小红书攻略 === */
    .xhs-section {
        background-color: var(--color-surface);
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-xl) var(--space-lg);
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        position: relative;
    }

    /* 小红书区微妙的斜角装饰线 */
    .xhs-section::before {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 32px;
        height: 0.5px;
        background-color: var(--color-accent);
        opacity: 0.25;
        transform: rotate(-45deg);
        transform-origin: top right;
    }

    .xhs-section h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 200;
        letter-spacing: 0.10em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-lg) 0;
        display: inline-block;
        position: relative;
    }

    .xhs-section h2::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 0.5px;
        background-color: var(--color-border);
    }

    .xhs-note {
        padding: var(--space-md) 0;
        border-bottom: 0.5px solid rgba(0, 0, 0, 0.04);
        transition: background-color var(--transition-fast);
        position: relative;
        padding-left: var(--space-md);
    }

    .xhs-note:last-child {
        border-bottom: none;
    }

    .xhs-note::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 3px;
        background-color: var(--color-accent);
        opacity: 0.35;
    }

    .xhs-note:hover {
        background-color: rgba(0, 0, 0, 0.005);
    }

    .xhs-note h3 {
        font-family: var(--font-heading);
        font-size: var(--font-size-body);
        font-weight: 300;
        letter-spacing: 0.04em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-xs) 0;
    }

    .xhs-note p {
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.02em;
        color: var(--color-text-secondary);
        margin: 0;
        line-height: 1.7;
    }

    /* === Tips Section 旅行贴士 === */
    .tips-section {
        background-color: var(--color-surface);
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-xl) var(--space-lg);
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        position: relative;
    }

    .tips-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 0.5px;
        background-color: var(--color-primary);
        opacity: 0.12;
    }

    .tips-section h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 200;
        letter-spacing: 0.10em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-lg) 0;
        display: inline-block;
        position: relative;
    }

    .tips-section h2::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 0.5px;
        background-color: var(--color-border);
    }

    .tips-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .tips-section ul li {
        position: relative;
        padding: var(--space-sm) 0 var(--space-sm) var(--space-lg);
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text);
        line-height: 1.7;
        border-bottom: 0.5px solid rgba(0, 0, 0, 0.025);
        transition: color var(--transition-fast);
    }

    .tips-section ul li:last-child {
        border-bottom: none;
    }

    .tips-section ul li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 6px;
        height: 0.5px;
        background-color: var(--color-accent);
        opacity: 0.5;
    }

    .tips-section ul li:hover {
        color: var(--color-text-heading);
    }

    /* === Emergency Section 紧急信息 === */
    .emergency-section {
        background-color: #FDFDFD;
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-xl) var(--space-lg);
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        position: relative;
    }

    /* 紧急区左侧微妙标记线 */
    .emergency-section::before {
        content: '';
        position: absolute;
        left: 0;
        top: var(--space-lg);
        bottom: var(--space-lg);
        width: 1px;
        background-color: rgba(0, 0, 0, 0.06);
    }

    .emergency-section h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 200;
        letter-spacing: 0.10em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-lg) 0;
        display: inline-block;
        position: relative;
    }

    .emergency-section h2::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 0.5px;
        background-color: var(--color-border);
    }

    .emergency-section p,
    .emergency-section .info-item {
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text);
        line-height: 1.8;
        margin: 0 0 var(--space-sm) 0;
        padding-left: var(--space-md);
        position: relative;
    }

    .emergency-section .info-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.65em;
        width: 4px;
        height: 0.5px;
        background-color: var(--color-accent);
    }

    /* === Packing Section 行李清单 === */
    .packing-section {
        background-color: var(--color-surface);
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-xl) var(--space-lg);
        border: 0.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        position: relative;
    }

    .packing-section::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: var(--space-lg);
        right: var(--space-lg);
        height: 0.5px;
        background-color: var(--color-primary);
        opacity: 0.06;
    }

    .packing-section h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 200;
        letter-spacing: 0.10em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-lg) 0;
        display: inline-block;
        position: relative;
    }

    .packing-section h2::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 0.5px;
        background-color: var(--color-border);
    }

    .packing-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-sm) var(--space-lg);
    }

    .packing-section ul li {
        font-size: var(--font-size-small);
        font-weight: 300;
        letter-spacing: 0.03em;
        color: var(--color-text);
        padding: var(--space-xs) 0;
        transition: color var(--transition-fast);
        position: relative;
        padding-left: var(--space-md);
    }

    .packing-section ul li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 4px;
        border: 0.5px solid var(--color-accent);
        opacity: 0.4;
        transition: opacity var(--transition-fast), border-color var(--transition-fast);
    }

    .packing-section ul li:hover {
        color: var(--color-text-heading);
    }

    .packing-section ul li:hover::before {
        opacity: 0.7;
        border-color: var(--color-secondary);
    }

    /* === Verification Badge 数据可信度徽章 === */
    .verification-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-family: var(--font-mono);
        font-size: 0.65rem;
        font-weight: 300;
        letter-spacing: 0.06em;
        padding: 3px 10px;
        border: 0.5px solid var(--color-border);
        border-radius: 0;
        color: var(--color-text-secondary);
        background-color: transparent;
        transition: border-color var(--transition-fast), color var(--transition-fast);
        text-transform: uppercase;
    }

    .verification-badge.community-match {
        border-color: rgba(0, 0, 0, 0.12);
        color: var(--color-secondary);
    }

    .verification-badge.community-only {
        border-color: rgba(0, 0, 0, 0.08);
        color: var(--color-accent);
    }

    .verification-badge:hover {
        border-color: var(--color-accent);
        color: var(--color-text);
    }

    /* === Footer === */
    footer {
        background-color: var(--color-surface);
        padding: var(--space-xl) var(--space-lg);
        text-align: center;
        border-top: 0.5px solid var(--color-border);
        margin-top: var(--space-xxl);
        font-family: var(--font-body);
        font-size: 0.7rem;
        font-weight: 300;
        letter-spacing: 0.08em;
        color: var(--color-text-secondary);
        position: relative;
    }

    footer::before {
        content: '';
        position: absolute;
        top: -0.5px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 0.5px;
        background-color: var(--color-primary);
        opacity: 0.15;
    }

    /* === 链接样式 === */
    .xhs-note a,
    footer a {
        color: var(--color-text);
        text-decoration: none;
        transition: color var(--transition-fast), border-color var(--transition-fast);
    }

    .xhs-note a:hover,
    footer a:hover {
        color: var(--color-text-heading);
    }

    /* === 通用细线分隔（模块间） === */
    .section-divider {
        width: 48px;
        height: 0.5px;
        background-color: var(--color-border);
        margin: var(--space-xl) auto;
        opacity: 0.6;
    }

    /* === 响应式：移动端适配 === */
    @media (max-width: 640px) {
        :root {
            --font-size-h1: 1.777rem;
            --font-size-h2: 1.333rem;
            --font-size-h3: 1rem;
            --font-size-body: 0.875rem;
            --font-size-small: 0.75rem;
            --space-xxl: 2.5rem;
            --space-xl: 1.75rem;
            --space-lg: 1.25rem;
            --space-md: 0.875rem;
        }

        .hero {
            padding: var(--space-xxl) var(--space-md) var(--space-xl);
        }

        .hero h1 {
            letter-spacing: 0.08em;
        }

        .day-card {
            margin: var(--space-md) var(--space-sm);
            padding: var(--space-lg) var(--space-md);
            border-radius: var(--radius-md);
        }

        .day-card::before {
            left: var(--space-md);
        }

        .day-card h2 {
            padding-left: var(--space-md);
            font-size: var(--font-size-h2);
            letter-spacing: 0.06em;
        }

        .day-card .day-theme {
            padding-left: var(--space-md);
        }

        .day-card .weather-badge {
            margin-left: var(--space-md);
        }

        .activity-item {
            padding-left: var(--space-md);
        }

        .activity-item .activity-order {
            left: 0;
            font-size: 0.65rem;
        }

        .day-map {
            margin-left: var(--space-md);
            width: calc(100% - var(--space-md));
            height: 160px;
        }

        .hotel-info {
            margin-left: var(--space-md);
        }

        .budget-section,
        .xhs-section,
        .tips-section,
        .emergency-section,
        .packing-section {
            margin: var(--space-md) var(--space-sm);
            padding: var(--space-lg) var(--space-md);
            border-radius: var(--radius-md);
        }

        .budget-grid {
            grid-template-columns: 1fr;
            gap: var(--space-sm);
        }

        .packing-section ul {
            grid-template-columns: 1fr;
        }

        .hero .weather-overview::after {
            display: none;
        }

        .hero .weather-overview,
        .hero .budget-overview {
            display: block;
            margin: var(--space-xs) 0;
        }
    }

    /* === 超感官交互：极其缓慢的全局过渡 === */
    .day-card,
    .budget-section,
    .xhs-section,
    .tips-section,
    .emergency-section,
    .packing-section,
    .xhs-note,
    .activity-item,
    .budget-item,
    .tips-section ul li,
    .packing-section ul li {
        transition: background-color var(--transition-normal), box-shadow var(--transition-normal), border-color var(--transition-normal);
    }

    /* === 打印样式：去除纹理保持纯净 === */
    @media print {
        body {
            background-image: none;
            background-color: #FFFFFF;
        }

        .hero::before,
        .hero::after,
        .day-card::before,
        .day-card h2::before,
        .budget-section::before,
        .budget-section::after,
        .xhs-section::before,
        .tips-section::before,
        .emergency-section::before,
        .packing-section::before,
        footer::before {
            display: none;
        }
    }
</style>
{% endblock %}

{% block header_decor %}
<!-- 超感官极简主义：Hero区域微妙的几何装饰 -->
<div class="hero-decor-top" aria-hidden="true" style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:64px;height:0.5px;background:rgba(0,0,0,0.12);pointer-events:none;z-index:1;"></div>
<div class="hero-decor-dot" aria-hidden="true" style="position:absolute;top:28px;right:28px;width:3px;height:3px;background:rgba(0,0,0,0.08);pointer-events:none;z-index:1;"></div>
{% endblock %}

{% block footer_decor %}
<!-- 超感官极简主义：Footer微妙的收束线 -->
<div aria-hidden="true" style="width:32px;height:0.5px;background:rgba(0,0,0,0.10);margin:0 auto 12px;pointer-events:none;"></div>
{% endblock %}
