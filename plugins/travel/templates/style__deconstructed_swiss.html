{% extends "base.html" %}

{% block style_vars %}
<style>
    :root {
        /* === 瑞士国际主义解构版 — 色彩系统 === */
        --color-bg: #fafaf8;
        --color-surface: #ffffff;
        --color-primary: #0d0d0d;
        --color-secondary: #2b2b2b;
        --color-accent: #e60023;
        --color-text: #1a1a1a;
        --color-text-secondary: #5c5c5c;
        --color-text-heading: #0a0a0a;
        --color-border: #d4d4d0;
        --color-shadow: rgba(0, 0, 0, 0.08);

        /* === 字体系统 — 无衬线几何字体 === */
        --font-heading: 'Helvetica Neue', 'Helvetica', 'Arial', 'Noto Sans SC', sans-serif;
        --font-body: 'Helvetica Neue', 'Helvetica', 'Arial', 'Noto Sans SC', sans-serif;
        --font-mono: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;

        /* === 字号 — 极端对比 === */
        --font-size-h1: clamp(3.2rem, 8vw, 5.6rem);
        --font-size-h2: clamp(1.6rem, 3.5vw, 2.2rem);
        --font-size-h3: clamp(1.05rem, 2.2vw, 1.25rem);
        --font-size-body: 0.95rem;
        --font-size-small: 0.78rem;

        /* === 行高 === */
        --line-height: 1.55;

        /* === 间距 — 基于8px网格 === */
        --space-xs: 0.375rem;
        --space-sm: 0.75rem;
        --space-md: 1.25rem;
        --space-lg: 2rem;
        --space-xl: 3rem;
        --space-xxl: 4.5rem;

        /* === 圆角 — 极少使用，保持锐利 === */
        --radius-sm: 0px;
        --radius-md: 1px;
        --radius-lg: 2px;

        /* === 过渡 === */
        --transition-fast: 0.12s ease;
        --transition-normal: 0.22s ease;
    }
</style>
{% endblock %}

{% block style_css %}
<style>
    /* ============================================================
       瑞士国际主义解构版 — 全局基调
       网格参考线贯穿整个页面，形成理性骨架
    ============================================================ */

    /* 限制主容器宽度，避免桌面端铺满全屏 */
    main, .container, .max-w-2xl {
        max-width: 720px;
        margin: 0 auto;
    }

    /* 页面背景 — 微妙的网格肌理 */
    body {
        background-color: var(--color-bg);
        background-image:
            linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
        background-size: 24px 24px;
        background-position: -2px -2px;
    }

    /* ============================================================
       HERO 封面区 — 解构网格 + 文字张力
    ============================================================ */
    .hero {
        position: relative;
        background: var(--color-surface);
        padding: var(--space-xxl) var(--space-lg) var(--space-xl);
        margin-bottom: var(--space-lg);
        border-bottom: 3px solid var(--color-primary);
        overflow: visible;
        z-index: 1;
    }

    /* Hero 网格线层 */
    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
            linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        background-size: 32px 32px;
        background-position: 8px 8px;
        z-index: 0;
        pointer-events: none;
    }

    /* 解构的偏移网格块 */
    .hero::after {
        content: '';
        position: absolute;
        top: 40%;
        right: -6px;
        width: 64px;
        height: 64px;
        border: 2px solid var(--color-accent);
        z-index: 1;
        pointer-events: none;
        transform: rotate(15deg);
        opacity: 0.7;
    }

    /* Hero 标题 — 极端字重，越界张力 */
    .hero h1 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h1);
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 0.88;
        color: var(--color-text-heading);
        text-transform: uppercase;
        position: relative;
        z-index: 2;
        margin: 0 0 var(--space-sm) -0.04em;
        word-break: break-all;
    }

    /* 标题重叠阴影 — 解构效果 */
    .hero h1::after {
        content: attr(data-shadow);
        position: absolute;
        top: 0.12em;
        left: 0.06em;
        color: transparent;
        -webkit-text-stroke: 1px rgba(230,0,35,0.25);
        z-index: -1;
        pointer-events: none;
        font-size: inherit;
        font-weight: inherit;
        letter-spacing: inherit;
    }

    /* 副标题 / 日期风格 */
    .hero .subtitle {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        position: relative;
        z-index: 2;
        margin-bottom: var(--space-lg);
        padding-left: var(--space-md);
        border-left: 2px solid var(--color-accent);
    }

    /* 天气 & 预算概览 — 网格对齐卡片 */
    .hero .weather-overview,
    .hero .budget-overview {
        position: relative;
        z-index: 2;
        display: inline-block;
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.06em;
        color: var(--color-text);
        background: var(--color-bg);
        padding: var(--space-sm) var(--space-md);
        margin-right: var(--space-sm);
        margin-bottom: var(--space-sm);
        border: 1px solid var(--color-border);
        position: relative;
    }

    /* 概览卡片角标 — 网格参考点 */
    .hero .weather-overview::before,
    .hero .budget-overview::before {
        content: '';
        position: absolute;
        top: -4px;
        left: -4px;
        width: 8px;
        height: 8px;
        background: var(--color-accent);
        border-radius: 0;
        z-index: 3;
    }

    /* ============================================================
       HEADER DECOR — 解构网格装饰元素
    ============================================================ */
    .header-grid-line-h {
        position: absolute;
        height: 1px;
        background: rgba(0,0,0,0.08);
        z-index: 1;
        pointer-events: none;
    }

    .header-grid-line-v {
        position: absolute;
        width: 1px;
        background: rgba(0,0,0,0.06);
        z-index: 1;
        pointer-events: none;
    }

    .header-geo-square {
        position: absolute;
        border: 1.5px solid rgba(0,0,0,0.15);
        z-index: 1;
        pointer-events: none;
        transform: rotate(-3deg);
    }

    .header-accent-dot {
        position: absolute;
        width: 6px;
        height: 6px;
        background: var(--color-accent);
        z-index: 3;
        pointer-events: none;
    }

    .header-crosshair {
        position: absolute;
        z-index: 1;
        pointer-events: none;
    }

    .header-crosshair::before,
    .header-crosshair::after {
        content: '';
        position: absolute;
        background: rgba(0,0,0,0.12);
    }

    .header-crosshair::before {
        width: 16px;
        height: 1px;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
    }

    .header-crosshair::after {
        width: 1px;
        height: 16px;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
    }

    /* ============================================================
       DAY-CARD — 每日行程卡片
       不对称边框 + 网格参考点 + 标题解构
    ============================================================ */
    .day-card {
        position: relative;
        background: var(--color-surface);
        margin: 0 var(--space-md) var(--space-lg);
        padding: var(--space-lg) var(--space-lg) var(--space-lg) calc(var(--space-lg) + 6px);
        border-left: 4px solid var(--color-primary);
        border-bottom: 1px solid var(--color-border);
        overflow: visible;
        z-index: 1;
    }

    /* 网格参考点标记 */
    .day-card::before {
        content: '';
        position: absolute;
        top: -5px;
        right: 20px;
        width: 10px;
        height: 10px;
        border: 1.5px solid var(--color-accent);
        background: transparent;
        z-index: 2;
        pointer-events: none;
    }

    /* 偏移的细线 */
    .day-card::after {
        content: '';
        position: absolute;
        bottom: 12px;
        right: 0;
        width: 40px;
        height: 1px;
        background: var(--color-accent);
        z-index: 2;
        pointer-events: none;
    }

    /* Day N 标题 — 大字重，紧密间距 */
    .day-card h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 900;
        letter-spacing: -0.03em;
        text-transform: uppercase;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-xs) -0.02em;
        position: relative;
        z-index: 1;
    }

    /* 标题下的红色短线 */
    .day-card h2::after {
        content: '';
        display: block;
        width: 28px;
        height: 3px;
        background: var(--color-accent);
        margin-top: var(--space-xs);
    }

    /* 日期主题 */
    .day-card .day-theme {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-md);
        padding-bottom: var(--space-sm);
        border-bottom: 1px dashed var(--color-border);
    }

    /* 天气徽章 */
    .day-card .weather-badge {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-text);
        background: var(--color-bg);
        padding: 2px 10px;
        margin-bottom: var(--space-md);
        border: 1px solid var(--color-border);
        position: relative;
    }

    .day-card .weather-badge::before {
        content: '';
        position: absolute;
        top: -3px;
        right: -3px;
        width: 6px;
        height: 6px;
        background: var(--color-accent);
        opacity: 0.6;
    }

    /* ============================================================
       ACTIVITY-ITEM — 活动条目
       编号 + 时间线 + 清晰层次
    ============================================================ */
    .activity-item {
        position: relative;
        padding: var(--space-md) 0 var(--space-md) var(--space-lg);
        margin-bottom: var(--space-sm);
        border-left: 1px solid var(--color-border);
        transition: border-color var(--transition-fast);
    }

    .activity-item:last-child {
        margin-bottom: 0;
    }

    /* 活动序号 — 几何标记 */
    .activity-item .activity-order {
        position: absolute;
        left: -11px;
        top: var(--space-md);
        width: 21px;
        height: 21px;
        background: var(--color-surface);
        border: 2px solid var(--color-primary);
        font-family: var(--font-mono);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-primary);
        z-index: 2;
    }

    /* 时间 */
    .activity-item .activity-time {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--color-accent);
        margin-bottom: 2px;
    }

    /* 活动标题 */
    .activity-item h3 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h3);
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--color-text-heading);
        margin: 0 0 var(--space-xs);
    }

    /* 描述 */
    .activity-item .activity-desc {
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        line-height: var(--line-height);
        color: var(--color-text);
        margin-bottom: var(--space-xs);
    }

    /* 地点链接 */
    .activity-item .activity-location {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.04em;
        margin-bottom: 2px;
    }

    .activity-item .activity-location a {
        color: var(--color-text);
        text-decoration: none;
        border-bottom: 1px solid var(--color-accent);
        transition: border-color var(--transition-fast);
    }

    .activity-item .activity-location a:hover {
        border-bottom-color: var(--color-primary);
    }

    /* 交通信息 */
    .activity-item .transport-info {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        margin-top: var(--space-xs);
        padding-left: var(--space-sm);
        border-left: 2px solid var(--color-border);
    }

    /* 餐饮信息 */
    .activity-item .meal-info {
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        color: var(--color-text-secondary);
        margin-top: 2px;
        font-style: italic;
    }

    /* ============================================================
       DAY-MAP — 地图容器（不能使用filter/opacity/mix-blend-mode）
    ============================================================ */
    .day-map {
        margin-top: var(--space-md);
        border: 1px solid var(--color-border);
        position: relative;
        min-height: 180px;
        background: #e8e8e4;
        overflow: hidden;
    }

    /* 地图占位网格 */
    .day-map::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: 0;
        pointer-events: none;
    }

    /* ============================================================
       HOTEL-INFO — 酒店信息
    ============================================================ */
    .hotel-info {
        margin-top: var(--space-md);
        padding: var(--space-md);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.04em;
        position: relative;
    }

    .hotel-info::before {
        content: 'HOTEL';
        position: absolute;
        top: -8px;
        left: var(--space-md);
        font-family: var(--font-mono);
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        background: var(--color-bg);
        padding: 0 6px;
        color: var(--color-accent);
        font-weight: 700;
    }

    /* ============================================================
       BUDGET-SECTION — 预算明细
       解构表格线条 + 红色总计
    ============================================================ */
    .budget-section {
        position: relative;
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        overflow: visible;
    }

    /* 偏移的顶部装饰线 */
    .budget-section::before {
        content: '';
        position: absolute;
        top: -3px;
        left: 30px;
        right: 30px;
        height: 1px;
        background: var(--color-accent);
        z-index: 2;
    }

    /* 网格参考角标 */
    .budget-section::after {
        content: '';
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 14px;
        height: 14px;
        border-right: 2px solid rgba(0,0,0,0.12);
        border-bottom: 2px solid rgba(0,0,0,0.12);
        z-index: 1;
        pointer-events: none;
    }

    .budget-section .budget-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--color-border);
        border: 1px solid var(--color-border);
    }

    .budget-section .budget-item {
        background: var(--color-surface);
        padding: var(--space-md);
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.03em;
        position: relative;
    }

    .budget-section .budget-item:nth-child(odd) {
        border-right: 1px solid var(--color-border);
    }

    /* 预算总计 — 红色高亮 */
    .budget-section .budget-total {
        grid-column: 1 / -1;
        background: var(--color-primary);
        color: #ffffff;
        padding: var(--space-md);
        font-family: var(--font-heading);
        font-size: 1.05rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        position: relative;
    }

    .budget-section .budget-total::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--color-accent);
    }

    /* ============================================================
       XHS-SECTION — 小红书攻略区
       偏移卡片 + 几何角标
    ============================================================ */
    .xhs-section {
        position: relative;
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        overflow: visible;
    }

    /* 偏移的几何标记 */
    .xhs-section::before {
        content: '';
        position: absolute;
        top: -6px;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 10px;
        height: 10px;
        background: var(--color-accent);
        z-index: 2;
    }

    /* 左侧装饰条 */
    .xhs-section::after {
        content: '';
        position: absolute;
        top: 20px;
        bottom: 20px;
        left: -2px;
        width: 2px;
        background: repeating-linear-gradient(
            to bottom,
            var(--color-primary) 0px,
            var(--color-primary) 6px,
            transparent 6px,
            transparent 12px
        );
        z-index: 1;
    }

    .xhs-section .xhs-note {
        position: relative;
        padding: var(--space-md);
        margin-bottom: var(--space-md);
        background: var(--color-bg);
        border-left: 3px solid var(--color-primary);
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        line-height: var(--line-height);
        transition: border-color var(--transition-fast);
    }

    .xhs-section .xhs-note:last-child {
        margin-bottom: 0;
    }

    .xhs-section .xhs-note:hover {
        border-left-color: var(--color-accent);
    }

    /* ============================================================
       TIPS-SECTION — 旅行贴士
       几何编号 + 不对称分隔
    ============================================================ */
    .tips-section {
        position: relative;
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        overflow: visible;
    }

    /* 顶部网格参考线 */
    .tips-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 40px;
        right: 40px;
        height: 1px;
        background: repeating-linear-gradient(
            to right,
            rgba(0,0,0,0.2) 0px,
            rgba(0,0,0,0.2) 3px,
            transparent 3px,
            transparent 8px
        );
        z-index: 2;
    }

    .tips-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .tips-section ul li {
        position: relative;
        padding: var(--space-md) 0 var(--space-md) calc(var(--space-lg) + 4px);
        border-bottom: 1px solid var(--color-border);
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        line-height: var(--line-height);
        counter-increment: tip-counter;
    }

    .tips-section ul li::before {
        content: '0' counter(tip-counter);
        position: absolute;
        left: 0;
        top: var(--space-md);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--color-accent);
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--color-border);
        background: var(--color-surface);
    }

    .tips-section ul li:last-child {
        border-bottom: none;
    }

    /* ============================================================
       EMERGENCY-SECTION — 紧急信息
       红色警示 + 几何边框
    ============================================================ */
    .emergency-section {
        position: relative;
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-lg);
        background: var(--color-surface);
        border: 2px solid var(--color-primary);
        border-left: 5px solid var(--color-accent);
        overflow: visible;
    }

    /* 警示斜条纹角 */
    .emergency-section::before {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0 32px 32px 0;
        border-color: transparent var(--color-accent) transparent transparent;
        z-index: 2;
        opacity: 0.85;
    }

    .emergency-section::after {
        content: '!';
        position: absolute;
        top: 3px;
        right: 5px;
        font-family: var(--font-heading);
        font-size: 0.75rem;
        font-weight: 900;
        color: #ffffff;
        z-index: 3;
    }

    /* ============================================================
       PACKING-SECTION — 行李清单
       清单标记线 + 网格对齐
    ============================================================ */
    .packing-section {
        position: relative;
        margin: var(--space-lg) var(--space-md);
        padding: var(--space-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        overflow: visible;
    }

    /* 左侧垂直参考线 */
    .packing-section::before {
        content: '';
        position: absolute;
        top: var(--space-lg);
        bottom: var(--space-lg);
        left: 36px;
        width: 1px;
        background: rgba(0,0,0,0.08);
        z-index: 1;
        pointer-events: none;
    }

    .packing-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .packing-section ul li {
        position: relative;
        padding: var(--space-sm) 0 var(--space-sm) var(--space-xl);
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        line-height: var(--line-height);
        border-bottom: 1px dotted var(--color-border);
    }

    .packing-section ul li::before {
        content: '';
        position: absolute;
        left: 28px;
        top: 50%;
        transform: translateY(-50%);
        width: 8px;
        height: 8px;
        border: 1.5px solid var(--color-primary);
        background: transparent;
    }

    .packing-section ul li:last-child {
        border-bottom: none;
    }

    /* ============================================================
       VERIFICATION-BADGE — 数据可信度徽章
       几何简洁风格
    ============================================================ */
    .verification-badge.community-match {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 4px 12px;
        border: 1px solid var(--color-primary);
        background: var(--color-surface);
        color: var(--color-primary);
        position: relative;
    }

    .verification-badge.community-match::before {
        content: '';
        width: 7px;
        height: 7px;
        background: var(--color-accent);
        flex-shrink: 0;
    }

    .verification-badge.community-only {
        font-family: var(--font-mono);
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 2px 8px;
        border: 1px solid var(--color-accent);
        color: var(--color-accent);
        background: transparent;
        display: inline-block;
    }

    /* ============================================================
       FOOTER — 页脚
       解构网格收尾
    ============================================================ */
    footer {
        position: relative;
        margin: var(--space-xxl) var(--space-md) var(--space-lg);
        padding: var(--space-lg) var(--space-lg);
        background: var(--color-primary);
        color: #ffffff;
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        letter-spacing: 0.08em;
        text-align: center;
        overflow: visible;
        z-index: 1;
    }

    /* 顶部红色强调线 */
    footer::before {
        content: '';
        position: absolute;
        top: 0;
        left: 20%;
        right: 20%;
        height: 3px;
        background: var(--color-accent);
    }

    /* 底部网格参考线 */
    footer::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 12px;
        right: 12px;
        height: 1px;
        background: rgba(255,255,255,0.15);
    }

    /* ============================================================
       FOOTER DECOR — 页脚装饰
    ============================================================ */
    .footer-geo-square {
        position: absolute;
        border: 1px solid rgba(255,255,255,0.2);
        pointer-events: none;
        z-index: 0;
    }

    .footer-dot-row {
        position: absolute;
        display: flex;
        gap: 6px;
        pointer-events: none;
        z-index: 0;
    }

    .footer-dot-row span {
        width: 3px;
        height: 3px;
        background: rgba(255,255,255,0.3);
        display: block;
    }

    /* ============================================================
       响应式微调
    ============================================================ */
    @media (max-width: 480px) {
        .hero {
            padding: var(--space-xl) var(--space-md) var(--space-lg);
        }

        .hero h1 {
            font-size: 2.4rem;
            letter-spacing: -0.03em;
        }

        .day-card {
            margin: 0 var(--space-sm) var(--space-md);
            padding: var(--space-md) var(--space-md) var(--space-md) calc(var(--space-md) + 4px);
        }

        .budget-section,
        .xhs-section,
        .tips-section,
        .emergency-section,
        .packing-section {
            margin-left: var(--space-sm);
            margin-right: var(--space-sm);
            padding: var(--space-md);
        }

        .budget-section .budget-grid {
            grid-template-columns: 1fr;
        }

        .budget-section .budget-item:nth-child(odd) {
            border-right: none;
            border-bottom: 1px solid var(--color-border);
        }

        .activity-item {
            padding-left: var(--space-md);
        }

        footer {
            margin-left: var(--space-sm);
            margin-right: var(--space-sm);
            padding: var(--space-md);
        }
    }

    @media (max-width: 380px) {
        .hero h1 {
            font-size: 2rem;
        }

        .hero .weather-overview,
        .hero .budget-overview {
            display: block;
            margin-right: 0;
        }
    }
</style>
{% endblock %}
