{% extends "base.html" %}

{% block style_vars %}
<style>
    :root {
        /* 超现实主义梦境色彩体系 */
        --color-bg: #1b1a2a;
        --color-surface: #f6efe0;
        --color-primary: #c67b6e;
        --color-secondary: #5e6b8a;
        --color-accent: #d4a853;
        --color-text: #2d2a35;
        --color-text-secondary: #6b5e5a;
        --color-text-heading: #1f1d2b;
        --color-border: #d9cbb8;
        --color-shadow: rgba(45, 35, 60, 0.18);
        --font-heading: 'Noto Serif SC', 'Georgia', 'Times New Roman', serif;
        --font-body: 'Noto Sans SC', 'Helvetica Neue', 'Arial', sans-serif;
        --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        --font-size-h1: 3.2rem;
        --font-size-h2: 1.75rem;
        --font-size-h3: 1.2rem;
        --font-size-body: 0.95rem;
        --font-size-small: 0.78rem;
        --line-height: 1.75;
        --space-xs: 0.3rem;
        --space-sm: 0.6rem;
        --space-md: 1.1rem;
        --space-lg: 1.8rem;
        --space-xl: 2.6rem;
        --space-xxl: 4rem;
        --radius-sm: 3px;
        --radius-md: 8px;
        --radius-lg: 20px;
        --transition-fast: 0.18s ease;
        --transition-normal: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style>
{% endblock %}

{% block style_css %}
<style>
    /* ========== 容器宽度约束 ========== */
    main,
    .container,
    .max-w-2xl {
        max-width: 720px;
        margin: 0 auto;
    }

    /* ========== 全局基调 ========== */
    body {
        background-color: var(--color-bg);
        background-image:
            radial-gradient(ellipse at 18% 12%, rgba(180, 140, 120, 0.22) 0%, transparent 55%),
            radial-gradient(ellipse at 75% 8%, rgba(140, 155, 185, 0.20) 0%, transparent 50%),
            radial-gradient(ellipse at 55% 70%, rgba(200, 170, 130, 0.14) 0%, transparent 60%),
            radial-gradient(circle at 30% 25%, rgba(220, 200, 170, 0.08) 0%, transparent 30%),
            radial-gradient(circle at 68% 35%, rgba(180, 160, 200, 0.10) 0%, transparent 35%),
            repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255, 255, 255, 0.008) 3px, rgba(255, 255, 255, 0.008) 4px);
        background-attachment: fixed;
        color: #e8e4dd;
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        line-height: var(--line-height);
        position: relative;
    }

    /* 全局微光纹理覆盖层 */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
            radial-gradient(circle at 22% 18%, rgba(255, 240, 210, 0.06) 0%, transparent 40%),
            radial-gradient(circle at 78% 22%, rgba(210, 220, 255, 0.05) 0%, transparent 38%),
            radial-gradient(circle at 50% 60%, rgba(240, 200, 160, 0.04) 0%, transparent 50%);
        mix-blend-mode: screen;
    }

    /* ========== Hero 封面区 ========== */
    .hero {
        position: relative;
        background: linear-gradient(175deg, #1f1d30 0%, #25223b 25%, #2a2540 50%, #1e1c2f 75%, #1b1a2a 100%);
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        padding: var(--space-xxl) var(--space-lg) var(--space-xl);
        margin-bottom: var(--space-lg);
        overflow: hidden;
        text-align: center;
        z-index: 1;
        box-shadow:
            0 8px 40px rgba(15, 12, 28, 0.5),
            0 2px 8px rgba(180, 150, 130, 0.12);
        border-bottom: 1px solid rgba(210, 180, 150, 0.25);
    }

    /* Hero 悬浮光轮 */
    .hero::before {
        content: '';
        position: absolute;
        top: -50px;
        right: -60px;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(220, 175, 130, 0.22) 0%, rgba(190, 140, 100, 0.08) 40%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        animation: heroGlowFloat 12s ease-in-out infinite;
    }

    .hero::after {
        content: '';
        position: absolute;
        bottom: -40px;
        left: -40px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(150, 160, 200, 0.18) 0%, rgba(130, 145, 180, 0.06) 45%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        animation: heroGlowFloat 14s ease-in-out 3s infinite reverse;
    }

    @keyframes heroGlowFloat {
        0%, 100% {
            transform: translate(0, 0) scale(1);
        }
        25% {
            transform: translate(15px, -12px) scale(1.06);
        }
        50% {
            transform: translate(-8px, 8px) scale(0.94);
        }
        75% {
            transform: translate(-14px, -6px) scale(1.04);
        }
    }

    .hero h1 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h1);
        font-weight: 700;
        color: #f3e8d6;
        letter-spacing: 0.06em;
        position: relative;
        z-index: 2;
        text-shadow: 0 2px 18px rgba(200, 160, 110, 0.35), 0 0 60px rgba(180, 140, 100, 0.18);
        margin-bottom: var(--space-sm);
        line-height: 1.25;
    }

    /* 标题下的超现实装饰线 */
    .hero h1::after {
        content: '';
        display: block;
        width: 80px;
        height: 2px;
        margin: var(--space-sm) auto 0;
        background: linear-gradient(90deg, transparent, var(--color-accent), rgba(210, 180, 140, 0.7), var(--color-accent), transparent);
        border-radius: 2px;
        box-shadow: 0 0 14px rgba(210, 170, 120, 0.5);
    }

    .hero .subtitle {
        font-family: var(--font-body);
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        color: rgba(220, 200, 175, 0.75);
        position: relative;
        z-index: 2;
        text-transform: uppercase;
        margin-bottom: var(--space-lg);
    }

    .hero .weather-overview,
    .hero .budget-overview {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: var(--space-sm);
        padding: var(--space-xs) var(--space-md);
        background: rgba(255, 245, 235, 0.06);
        border: 1px solid rgba(210, 185, 155, 0.2);
        border-radius: 30px;
        font-size: var(--font-size-small);
        color: #d5cabc;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        margin: var(--space-xs) var(--space-xs);
        letter-spacing: 0.04em;
    }

    /* ========== 装饰性拱门框架 (Hero内) ========== */
    .hero-decor-arch {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 140px;
        border: 1.5px solid rgba(200, 175, 145, 0.18);
        border-radius: 100px 100px 0 0;
        border-bottom: none;
        pointer-events: none;
        z-index: 0;
        opacity: 0.6;
    }

    .hero-decor-arch::before {
        content: '';
        position: absolute;
        bottom: -8px;
        left: -20px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgba(210, 180, 140, 0.25);
        box-shadow: 0 0 12px rgba(200, 160, 110, 0.3);
        animation: heroGlowFloat 8s ease-in-out 1s infinite;
    }

    .hero-decor-arch::after {
        content: '';
        position: absolute;
        bottom: -14px;
        right: -26px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(180, 170, 200, 0.22);
        box-shadow: 0 0 10px rgba(160, 150, 190, 0.25);
        animation: heroGlowFloat 9s ease-in-out 5s infinite;
    }

    /* 悬浮碎片 */
    .hero-decor-fragment {
        position: absolute;
        width: 28px;
        height: 28px;
        border: 1.2px solid rgba(210, 185, 150, 0.22);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
        animation: fragmentDrift 16s ease-in-out infinite;
    }

    .hero-decor-fragment.f2 {
        width: 18px;
        height: 18px;
        top: 28%;
        right: 16%;
        animation-delay: 4s;
        animation-duration: 14s;
        border-radius: 2px;
        border-color: rgba(190, 175, 200, 0.2);
    }

    .hero-decor-fragment.f3 {
        width: 22px;
        height: 22px;
        bottom: 20%;
        left: 12%;
        animation-delay: 7s;
        animation-duration: 18s;
        border-radius: 3px;
        border-color: rgba(200, 170, 140, 0.18);
        transform: rotate(35deg);
    }

    @keyframes fragmentDrift {
        0%, 100% {
            transform: translate(0, 0) rotate(0deg);
            opacity: 0.4;
        }
        30% {
            transform: translate(18px, -20px) rotate(15deg);
            opacity: 0.7;
        }
        60% {
            transform: translate(-12px, 14px) rotate(-10deg);
            opacity: 0.35;
        }
        85% {
            transform: translate(8px, -6px) rotate(8deg);
            opacity: 0.55;
        }
    }

    /* ========== 主内容区包装 ========== */
    main {
        position: relative;
        z-index: 1;
        padding: 0 var(--space-md);
    }

    /* ========== Day Card ========== */
    .day-card {
        position: relative;
        background: var(--color-surface);
        background-image:
            linear-gradient(180deg, rgba(250, 245, 235, 0.6) 0%, rgba(245, 238, 222, 0.3) 100%),
            radial-gradient(ellipse at 85% 10%, rgba(200, 170, 140, 0.12) 0%, transparent 50%),
            radial-gradient(ellipse at 15% 90%, rgba(170, 160, 195, 0.08) 0%, transparent 45%);
        border-radius: var(--radius-md);
        padding: var(--space-xl) var(--space-lg);
        margin-bottom: var(--space-lg);
        box-shadow:
            0 6px 28px var(--color-shadow),
            0 1px 4px rgba(30, 20, 40, 0.08),
            inset 0 1px 0 rgba(255, 250, 240, 0.5);
        border: 1px solid var(--color-border);
        color: var(--color-text);
        transition: box-shadow var(--transition-normal), transform var(--transition-fast);
        overflow: visible;
    }

    /* 卡片偏移边框——拼贴画风格 */
    .day-card::before {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: var(--radius-md);
        border: 1.2px solid rgba(200, 175, 145, 0.35);
        pointer-events: none;
        z-index: -1;
        transform: rotate(-0.3deg) translate(1px, 2px);
        box-shadow: 0 0 0 3px rgba(190, 165, 140, 0.08);
        transition: transform var(--transition-normal);
    }

    .day-card::after {
        content: '';
        position: absolute;
        top: 14px;
        right: 18px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px dashed rgba(190, 165, 140, 0.3);
        pointer-events: none;
        z-index: 0;
        opacity: 0.55;
        animation: fragmentDrift 20s ease-in-out 2s infinite;
    }

    .day-card:hover {
        box-shadow:
            0 10px 36px rgba(40, 28, 55, 0.22),
            0 2px 6px rgba(30, 20, 40, 0.1),
            inset 0 1px 0 rgba(255, 250, 240, 0.5);
    }

    .day-card:hover::before {
        transform: rotate(0.1deg) translate(-2px, -1px);
    }

    .day-card h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        color: var(--color-text-heading);
        letter-spacing: 0.03em;
        margin-bottom: var(--space-xs);
        position: relative;
        z-index: 1;
        display: inline-block;
    }

    /* Day标题前的菱形装饰 */
    .day-card h2::before {
        content: '◆';
        font-size: 0.45em;
        color: var(--color-primary);
        margin-right: 0.45em;
        vertical-align: middle;
        display: inline-block;
        animation: diamondPulse 3s ease-in-out infinite;
        text-shadow: 0 0 8px rgba(195, 120, 105, 0.4);
    }

    @keyframes diamondPulse {
        0%, 100% {
            opacity: 0.7;
            transform: scale(1);
        }
        50% {
            opacity: 1;
            transform: scale(1.25);
        }
    }

    .day-card .day-theme {
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        letter-spacing: 0.12em;
        color: var(--color-primary);
        text-transform: uppercase;
        margin-bottom: var(--space-md);
        position: relative;
        z-index: 1;
        padding-left: var(--space-sm);
        border-left: 2px solid rgba(195, 120, 105, 0.4);
    }

    .day-card .weather-badge {
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        font-size: var(--font-size-small);
        color: var(--color-text-secondary);
        background: rgba(220, 200, 175, 0.25);
        padding: var(--space-xs) var(--space-sm);
        border-radius: 20px;
        margin-bottom: var(--space-md);
        position: relative;
        z-index: 1;
        letter-spacing: 0.03em;
        border: 1px solid rgba(190, 165, 140, 0.25);
    }

    /* ========== Activity Item ========== */
    .activity-item {
        position: relative;
        padding: var(--space-md) var(--space-md) var(--space-md) var(--space-xl);
        margin-bottom: var(--space-sm);
        border-left: 2px solid rgba(195, 145, 120, 0.3);
        transition: border-color var(--transition-fast), background var(--transition-normal);
        z-index: 1;
    }

    .activity-item::before {
        content: '';
        position: absolute;
        left: -7px;
        top: var(--space-md);
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--color-primary);
        box-shadow: 0 0 10px rgba(195, 120, 100, 0.4);
        z-index: 1;
        transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .activity-item:hover::before {
        transform: scale(1.5);
        box-shadow: 0 0 18px rgba(195, 120, 100, 0.55);
    }

    .activity-item:hover {
        border-left-color: rgba(195, 120, 100, 0.6);
        background: rgba(245, 235, 218, 0.4);
    }

    .activity-item h3 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h3);
        color: var(--color-text-heading);
        margin-bottom: var(--space-xs);
        letter-spacing: 0.02em;
    }

    .activity-order {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        color: var(--color-primary);
        letter-spacing: 0.06em;
        font-weight: 600;
    }

    .activity-time {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        color: var(--color-text-secondary);
        letter-spacing: 0.04em;
        margin-bottom: var(--space-xs);
    }

    .activity-desc {
        color: var(--color-text);
        font-size: var(--font-size-body);
        margin-bottom: var(--space-xs);
    }

    .activity-location {
        font-size: var(--font-size-small);
        color: var(--color-secondary);
        letter-spacing: 0.03em;
    }

    .activity-location a {
        color: var(--color-secondary);
        text-decoration: none;
        border-bottom: 1px dotted rgba(95, 108, 140, 0.4);
        transition: border-color var(--transition-fast), color var(--transition-fast);
    }

    .activity-location a:hover {
        color: var(--color-primary);
        border-bottom-color: var(--color-primary);
    }

    .transport-info,
    .meal-info {
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        font-size: var(--font-size-small);
        color: var(--color-text-secondary);
        background: rgba(220, 205, 180, 0.2);
        padding: var(--space-xs) var(--space-sm);
        border-radius: 14px;
        margin-top: var(--space-xs);
        margin-right: var(--space-xs);
        letter-spacing: 0.03em;
        border: 1px solid rgba(190, 165, 140, 0.2);
    }

    /* ========== Day Map ========== */
    .day-map {
        border-radius: var(--radius-sm);
        margin-top: var(--space-md);
        border: 1px solid var(--color-border);
        overflow: hidden;
        position: relative;
        z-index: 1;
        min-height: 200px;
        background: #f0ebe0;
    }

    /* 地图装饰——超现实框架 */
    .day-map::before {
        content: '';
        position: absolute;
        inset: -3px;
        border: 1px dashed rgba(195, 150, 120, 0.25);
        border-radius: var(--radius-sm);
        pointer-events: none;
        z-index: 2;
        opacity: 0.6;
    }

    /* ========== Hotel Info ========== */
    .hotel-info {
        margin-top: var(--space-md);
        padding: var(--space-md);
        background: rgba(240, 228, 208, 0.5);
        border-radius: var(--radius-sm);
        border: 1px solid rgba(200, 175, 145, 0.25);
        position: relative;
        z-index: 1;
        font-size: var(--font-size-small);
        color: var(--color-text);
        letter-spacing: 0.03em;
    }

    .hotel-info::before {
        content: '☾';
        font-size: 1.4em;
        position: absolute;
        top: -10px;
        right: 16px;
        color: var(--color-accent);
        opacity: 0.5;
        pointer-events: none;
    }

    /* ========== Budget Section ========== */
    .budget-section {
        background: var(--color-surface);
        background-image:
            radial-gradient(ellipse at 10% 30%, rgba(200, 175, 145, 0.10) 0%, transparent 55%),
            radial-gradient(ellipse at 80% 70%, rgba(170, 160, 195, 0.07) 0%, transparent 50%);
        border-radius: var(--radius-md);
        padding: var(--space-xl) var(--space-lg);
        margin-bottom: var(--space-lg);
        border: 1px solid var(--color-border);
        position: relative;
        box-shadow:
            0 5px 24px var(--color-shadow),
            inset 0 1px 0 rgba(255, 250, 240, 0.45);
        color: var(--color-text);
        overflow: visible;
    }

    /* 偏移双层边框 */
    .budget-section::before {
        content: '';
        position: absolute;
        inset: -5px;
        border-radius: var(--radius-md);
        border: 1px solid rgba(200, 170, 140, 0.28);
        pointer-events: none;
        z-index: -1;
        transform: rotate(0.25deg) translate(-2px, -1px);
    }

    .budget-section::after {
        content: '';
        position: absolute;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 1.2px solid rgba(210, 180, 150, 0.2);
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
        animation: fragmentDrift 22s ease-in-out 6s infinite;
    }

    .budget-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-md);
        position: relative;
        z-index: 1;
    }

    .budget-item {
        padding: var(--space-md);
        background: rgba(248, 242, 230, 0.5);
        border-radius: var(--radius-sm);
        border: 1px solid rgba(200, 175, 145, 0.2);
        text-align: center;
        transition: box-shadow var(--transition-normal), transform var(--transition-fast);
        position: relative;
    }

    .budget-item::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 30px;
        height: 2px;
        background: var(--color-accent);
        border-radius: 2px;
        opacity: 0;
        transition: opacity var(--transition-normal), width var(--transition-normal);
    }

    .budget-item:hover::after {
        opacity: 0.6;
        width: 50px;
    }

    .budget-item:hover {
        box-shadow: 0 4px 16px rgba(40, 28, 55, 0.12);
        transform: translateY(-2px);
    }

    .budget-total {
        grid-column: 1 / -1;
        text-align: center;
        padding: var(--space-lg) var(--space-md);
        font-family: var(--font-heading);
        font-size: 2rem;
        color: var(--color-text-heading);
        letter-spacing: 0.04em;
        position: relative;
        z-index: 1;
        border-top: 1px solid rgba(195, 150, 120, 0.25);
        margin-top: var(--space-sm);
    }

    .budget-total::before {
        content: '◆';
        display: block;
        font-size: 0.5em;
        color: var(--color-accent);
        margin-bottom: var(--space-sm);
        opacity: 0.7;
        text-shadow: 0 0 10px rgba(210, 170, 120, 0.4);
    }

    /* ========== XHS Section ========== */
    .xhs-section {
        background: var(--color-surface);
        background-image:
            linear-gradient(175deg, rgba(252, 248, 238, 0.5) 0%, rgba(245, 235, 218, 0.3) 100%),
            radial-gradient(ellipse at 70% 20%, rgba(210, 180, 150, 0.10) 0%, transparent 50%);
        border-radius: var(--radius-md);
        padding: var(--space-xl) var(--space-lg);
        margin-bottom: var(--space-lg);
        border: 1px solid var(--color-border);
        position: relative;
        box-shadow:
            0 5px 24px var(--color-shadow),
            inset 0 1px 0 rgba(255, 250, 240, 0.45);
        color: var(--color-text);
        overflow: visible;
    }

    .xhs-section::before {
        content: '';
        position: absolute;
        top: -4px;
        left: 30px;
        right: 30px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(195, 145, 115, 0.35), transparent);
        pointer-events: none;
        z-index: 1;
        border-radius: 1px;
    }

    .xhs-note {
        position: relative;
        padding: var(--space-md);
        margin-bottom: var(--space-md);
        background: rgba(250, 244, 232, 0.55);
        border-radius: var(--radius-sm);
        border: 1px solid rgba(200, 170, 140, 0.2);
        transition: box-shadow var(--transition-normal), transform var(--transition-fast);
        z-index: 1;
    }

    .xhs-note::after {
        content: '';
        position: absolute;
        top: 8px;
        right: 12px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1px dashed rgba(195, 150, 120, 0.25);
        pointer-events: none;
        opacity: 0.5;
        transition: opacity var(--transition-fast);
    }

    .xhs-note:hover {
        box-shadow: 0 6px 20px rgba(40, 28, 50, 0.13);
        transform: translateY(-1px) rotate(0.1deg);
    }

    .xhs-note:hover::after {
        opacity: 0.8;
    }

    /* ========== Tips Section ========== */
    .tips-section {
        background: var(--color-surface);
        background-image:
            radial-gradient(ellipse at 30% 50%, rgba(200, 175, 145, 0.08) 0%, transparent 60%);
        border-radius: var(--radius-md);
        padding: var(--space-xl) var(--space-lg);
        margin-bottom: var(--space-lg);
        border: 1px solid var(--color-border);
        position: relative;
        box-shadow:
            0 5px 24px var(--color-shadow),
            inset 0 1px 0 rgba(255, 250, 240, 0.45);
        color: var(--color-text);
        overflow: visible;
    }

    .tips-section ul {
        list-style: none;
        padding-left: 0;
        position: relative;
        z-index: 1;
    }

    .tips-section ul li {
        position: relative;
        padding: var(--space-sm) 0 var(--space-sm) 2.2em;
        margin-bottom: var(--space-xs);
        border-bottom: 1px dotted rgba(190, 165, 140, 0.25);
        transition: padding-left var(--transition-fast);
    }

    .tips-section ul li::before {
        content: '◈';
        position: absolute;
        left: 0;
        top: var(--space-sm);
        font-size: 0.7em;
        color: var(--color-primary);
        opacity: 0.7;
        transition: opacity var(--transition-fast), transform var(--transition-fast);
        text-shadow: 0 0 6px rgba(195, 120, 100, 0.3);
    }

    .tips-section ul li:hover::before {
        opacity: 1;
        transform: rotate(90deg);
    }

    .tips-section ul li:hover {
        padding-left: 2.6em;
    }

    /* ========== Emergency Section ========== */
    .emergency-section {
        background: var(--color-surface);
        background-image:
            linear-gradient(135deg, rgba(250, 240, 225, 0.6) 0%, rgba(248, 235, 218, 0.4) 100%);
        border-radius: var(--radius-md);
        padding: var(--space-xl) var(--space-lg);
        margin-bottom: var(--space-lg);
        border: 2px solid rgba(195, 120, 100, 0.35);
        position: relative;
        box-shadow:
            0 5px 24px var(--color-shadow),
            0 0 0 4px rgba(195, 130, 110, 0.06);
        color: var(--color-text);
        overflow: visible;
    }

    .emergency-section::before {
        content: '';
        position: absolute;
        top: -1px;
        left: 20px;
        right: 20px;
        height: 2px;
        background: var(--color-primary);
        border-radius: 2px;
        opacity: 0.5;
        pointer-events: none;
        z-index: 1;
    }

    .emergency-section::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 40px;
        right: 40px;
        height: 2px;
        background: var(--color-primary);
        border-radius: 2px;
        opacity: 0.3;
        pointer-events: none;
        z-index: 1;
    }

    /* ========== Packing Section ========== */
    .packing-section {
        background: var(--color-surface);
        background-image:
            radial-gradient(ellipse at 60% 40%, rgba(210, 185, 155, 0.09) 0%, transparent 55%),
            radial-gradient(ellipse at 25% 75%, rgba(175, 165, 195, 0.06) 0%, transparent 50%);
        border-radius: var(--radius-md);
        padding: var(--space-xl) var(--space-lg);
        margin-bottom: var(--space-lg);
        border: 1px solid var(--color-border);
        position: relative;
        box-shadow:
            0 5px 24px var(--color-shadow),
            inset 0 1px 0 rgba(255, 250, 240, 0.45);
        color: var(--color-text);
        overflow: visible;
    }

    .packing-section::after {
        content: '';
        position: absolute;
        bottom: 16px;
        right: 24px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1.2px dashed rgba(200, 170, 140, 0.22);
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
    }

    /* ========== Verification Badges ========== */
    .verification-badge.community-match,
    .verification-badge.community-only {
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        font-size: var(--font-size-small);
        padding: var(--space-xs) var(--space-sm);
        border-radius: 20px;
        letter-spacing: 0.04em;
        position: relative;
        z-index: 1;
        transition: box-shadow var(--transition-normal);
    }

    .verification-badge.community-match {
        background: rgba(210, 180, 140, 0.2);
        color: #8b6d4a;
        border: 1px solid rgba(190, 155, 120, 0.35);
    }

    .verification-badge.community-only {
        background: rgba(180, 170, 200, 0.18);
        color: #5e5570;
        border: 1px solid rgba(160, 150, 185, 0.3);
    }

    .verification-badge.community-match:hover,
    .verification-badge.community-only:hover {
        box-shadow: 0 2px 10px rgba(40, 25, 50, 0.12);
    }

    /* ========== Footer ========== */
    footer {
        background: linear-gradient(180deg, #1e1c2f 0%, #1b1a2a 100%);
        border-top: 1px solid rgba(210, 180, 150, 0.2);
        color: #c5bdb0;
        padding: var(--space-xl) var(--space-md);
        text-align: center;
        font-size: var(--font-size-small);
        letter-spacing: 0.05em;
        position: relative;
        z-index: 1;
        margin-top: var(--space-xl);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    footer::before {
        content: '';
        display: block;
        width: 60px;
        height: 2px;
        margin: 0 auto var(--space-md);
        background: linear-gradient(90deg, transparent, rgba(210, 170, 130, 0.5), transparent);
        border-radius: 2px;
    }

    /* ========== 标题通用装饰 ========== */
    .xhs-section h2,
    .tips-section h2,
    .emergency-section h2,
    .packing-section h2,
    .budget-section h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        color: var(--color-text-heading);
        letter-spacing: 0.04em;
        margin-bottom: var(--space-lg);
        position: relative;
        z-index: 1;
        display: inline-block;
    }

    .xhs-section h2::after,
    .tips-section h2::after,
    .emergency-section h2::after,
    .packing-section h2::after,
    .budget-section h2::after {
        content: '';
        display: block;
        width: 40px;
        height: 1.5px;
        margin-top: var(--space-xs);
        background: var(--color-accent);
        border-radius: 1px;
        opacity: 0.55;
    }

    /* ========== 响应式微调 ========== */
    @media (max-width: 640px) {
        :root {
            --font-size-h1: 2.3rem;
            --font-size-h2: 1.4rem;
            --font-size-h3: 1.05rem;
            --font-size-body: 0.88rem;
            --font-size-small: 0.72rem;
            --space-xxl: 2.5rem;
            --space-xl: 1.8rem;
            --space-lg: 1.2rem;
            --space-md: 0.8rem;
        }

        .hero {
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            padding: var(--space-xl) var(--space-md) var(--space-lg);
        }

        .hero-decor-arch {
            width: 130px;
            height: 90px;
            top: 10px;
        }

        .hero-decor-fragment {
            width: 18px;
            height: 18px;
        }

        .hero-decor-fragment.f2 {
            width: 12px;
            height: 12px;
        }

        .hero-decor-fragment.f3 {
            width: 14px;
            height: 14px;
        }

        .day-card,
        .budget-section,
        .xhs-section,
        .tips-section,
        .emergency-section,
        .packing-section {
            padding: var(--space-lg) var(--space-md);
            margin-bottom: var(--space-md);
        }

        .budget-grid {
            grid-template-columns: 1fr;
            gap: var(--space-sm);
        }

        .budget-total {
            font-size: 1.5rem;
        }

        .activity-item {
            padding-left: var(--space-lg);
        }

        .day-card::before,
        .budget-section::before {
            inset: -3px;
        }
    }

    @media (max-width: 380px) {
        :root {
            --font-size-h1: 2rem;
            --font-size-h2: 1.25rem;
        }

        .hero h1 {
            letter-spacing: 0.03em;
        }

        .hero .subtitle {
            letter-spacing: 0.1em;
            font-size: 0.7rem;
        }

        .budget-grid {
            grid-template-columns: 1fr;
        }

        .hero-decor-arch {
            display: none;
        }
    }
</style>
{% endblock %}

{% block header_decor %}
<!-- 超现实主义装饰：拱门框架 -->
<div class="hero-decor-arch" aria-hidden="true"></div>
<!-- 悬浮几何碎片 -->
<div class="hero-decor-fragment f1" style="top:18%;left:10%;" aria-hidden="true"></div>
<div class="hero-decor-fragment f2" aria-hidden="true"></div>
<div class="hero-decor-fragment f3" aria-hidden="true"></div>
{% endblock %}

{% block footer_decor %}
<!-- 页脚超现实装饰：微小悬浮光点（纯CSS已通过footer::before处理，此处留空以保持简洁） -->
{% endblock %}
