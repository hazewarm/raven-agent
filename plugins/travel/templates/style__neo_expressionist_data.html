{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
  --color-bg: #F5F3EF;
  --color-surface: #FFFFFF;
  --color-primary: #E63946;
  --color-secondary: #1D3557;
  --color-accent: #F4A261;
  --color-text: #2B2B2B;
  --color-text-secondary: #6B6B6B;
  --color-text-heading: #1D3557;
  --color-border: #2B2B2B;
  --color-shadow: rgba(29, 53, 87, 0.08);
  --font-heading: 'Noto Serif SC', 'Times New Roman', serif;
  --font-body: 'Noto Sans SC', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
  --font-size-h1: 3.5rem;
  --font-size-h2: 2rem;
  --font-size-h3: 1.5rem;
  --font-size-body: 1rem;
  --font-size-small: 0.85rem;
  --line-height: 1.7;
  --space-xs: 0.25rem;
  --space-sm: 0.5rem;
  --space-md: 1rem;
  --space-lg: 1.5rem;
  --space-xl: 2.5rem;
  --space-xxl: 4rem;
  --radius-sm: 2px;
  --radius-md: 6px;
  --radius-lg: 12px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.3s ease;
}
</style>
{% endblock %}

{% block style_css %}
<style>
main,
.container,
.max-w-2xl {
  max-width: 720px;
  margin: 0 auto;
}

body {
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%232b2b2b' stroke-opacity='0.05' stroke-width='1'%3E%3Cpath d='M10 15 Q 30 5, 40 25 T 70 20'/%3E%3Ccircle cx='85' cy='10' r='3' fill='%23E63946' fill-opacity='0.08'/%3E%3Cpath d='M5 50 Q 25 40, 35 60 T 75 55'/%3E%3Ccircle cx='15' cy='75' r='4' fill='%23F4A261' fill-opacity='0.06'/%3E%3Cpath d='M55 80 Q 70 70, 80 85'/%3E%3Cpath d='M90 45 L 95 50 L 90 55'/%3E%3C/g%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 200px 200px;
  font-family: var(--font-body);
  color: var(--color-text);
  line-height: var(--line-height);
}

.hero {
  position: relative;
  background: var(--color-surface);
  padding: var(--space-xxl) var(--space-lg) var(--space-xl);
  margin-bottom: var(--space-lg);
  border-bottom: 4px solid var(--color-primary);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -20px;
  right: -30px;
  width: 180px;
  height: 180px;
  background: radial-gradient(circle at 30% 40%, rgba(230, 57, 70, 0.15) 0%, transparent 70%);
  border-radius: 40% 60% 50% 50%;
  transform: rotate(15deg);
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -15px;
  left: -20px;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle at 70% 60%, rgba(244, 162, 97, 0.12) 0%, transparent 70%);
  border-radius: 60% 40% 50% 50%;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h1);
  font-weight: 900;
  color: var(--color-text-heading);
  letter-spacing: -0.02em;
  line-height: 1.1;
  position: relative;
  z-index: 1;
  text-shadow: 2px 2px 0 rgba(230, 57, 70, 0.1);
}

.hero h1::after {
  content: '';
  display: block;
  width: 70%;
  height: 6px;
  margin-top: 0.5rem;
  background: url("data:image/svg+xml,%3Csvg width='100' height='6' viewBox='0 0 100 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 3 Q 10 0, 20 3 T 40 3 T 60 3 T 80 3 T 100 3' stroke='%23E63946' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E") repeat-x;
  background-size: contain;
}

.hero .subtitle {
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: var(--space-md);
  position: relative;
  z-index: 1;
}

.weather-overview {
  display: flex;
  align-items: baseline;
  gap: var(--space-md);
  margin-top: var(--space-lg);
  padding: var(--space-md) var(--space-lg);
  background: rgba(255,255,255,0.9);
  border: 1px dashed var(--color-primary);
  border-radius: var(--radius-md);
  position: relative;
  z-index: 1;
}

.weather-overview::before {
  content: '🌡️';
  font-size: 1.5rem;
}

.budget-overview {
  display: flex;
  align-items: baseline;
  gap: var(--space-md);
  margin-top: var(--space-sm);
  padding: var(--space-md) var(--space-lg);
  background: rgba(255,255,255,0.95);
  border: 1px dashed var(--color-accent);
  border-radius: var(--radius-md);
  position: relative;
  z-index: 1;
}

.budget-overview::before {
  content: '💰';
  font-size: 1.5rem;
}

.day-card {
  background: var(--color-surface);
  margin: var(--space-lg) 0;
  padding: var(--space-xl) var(--space-lg);
  border: 2px solid transparent;
  border-image: url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='6' height='6' fill='%231D3557' fill-opacity='0.4'/%3E%3Crect x='1' y='1' width='4' height='4' fill='%23FFFFFF'/%3E%3C/svg%3E") 2 round;
  border-radius: 0;
  position: relative;
  box-shadow: 8px 8px 0 rgba(29, 53, 87, 0.05);
}

.day-card::before {
  content: '';
  position: absolute;
  top: -10px;
  right: -10px;
  width: 30px;
  height: 30px;
  background: var(--color-accent);
  opacity: 0.6;
  border-radius: 50% 50% 0 50%;
  transform: rotate(20deg);
}

.day-card::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 20px;
  width: 60px;
  height: 4px;
  background: repeating-linear-gradient(90deg, var(--color-primary) 0px, var(--color-primary) 6px, transparent 6px, transparent 12px);
}

.day-card h2 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h2);
  font-weight: 800;
  color: var(--color-text-heading);
  margin-bottom: var(--space-sm);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.day-card h2::before {
  content: '▹';
  color: var(--color-primary);
  font-size: 1.8rem;
}

.day-theme {
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
  background: rgba(29, 53, 87, 0.06);
  display: inline-block;
  padding: 0.2em 0.8em;
  border-radius: 0;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-md);
  text-transform: uppercase;
}

.weather-badge {
  background: var(--color-primary);
  color: white;
  padding: 0.2em 0.8em;
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  display: inline-flex;
  align-items: center;
  gap: 0.3em;
  margin-left: var(--space-md);
}

.activity-item {
  position: relative;
  padding: var(--space-md) 0 var(--space-md) var(--space-xl);
  margin-bottom: var(--space-sm);
  border-left: 2px dotted var(--color-border);
}

.activity-item:last-child {
  border-left-color: transparent;
}

.activity-item::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 1.4em;
  width: 10px;
  height: 10px;
  background: var(--color-accent);
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.3);
}

.activity-order {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--color-primary);
  font-size: var(--font-size-small);
}

.activity-time {
  font-family: var(--font-mono);
  color: var(--color-text-secondary);
  font-size: var(--font-size-small);
  margin-left: var(--space-sm);
}

.activity-desc {
  margin-top: 0.3em;
  color: var(--color-text);
}

.activity-location {
  font-size: var(--font-size-small);
  color: var(--color-secondary);
  margin-top: 0.2em;
}

.activity-location a {
  text-decoration: underline;
  text-decoration-style: wavy;
  text-decoration-color: var(--color-accent);
  color: inherit;
}

.transport-info,
.meal-info {
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
  margin-top: 0.15em;
}

.day-map {
  width: 100%;
  height: 200px;
  background: #e9e5df;
  margin: var(--space-md) 0;
  border: 2px solid var(--color-border);
  position: relative;
}

.hotel-info {
  margin-top: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: rgba(29, 53, 87, 0.04);
  border-left: 4px solid var(--color-secondary);
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
}

.budget-section {
  background: var(--color-surface);
  padding: var(--space-xl) var(--space-lg);
  margin: var(--space-lg) 0;
  position: relative;
  border-top: 3px solid var(--color-accent);
  border-bottom: 3px solid var(--color-accent);
}

.budget-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='%23E63946' fill-opacity='0.1'/%3E%3Ccircle cx='12' cy='12' r='1.5' fill='%231D3557' fill-opacity='0.08'/%3E%3C/svg%3E");
  pointer-events: none;
}

.budget-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-md);
}

.budget-item {
  position: relative;
  padding: var(--space-sm) 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  z-index: 1;
}

.budget-item::before {
  content: '';
  position: absolute;
  left: 0;
  bottom: 0;
  height: 6px;
  width: var(--bar-width, 70%);
  background: repeating-linear-gradient(45deg, var(--color-primary), var(--color-primary) 2px, rgba(230,57,70,0.2) 2px, rgba(230,57,70,0.2) 6px);
  opacity: 0.6;
}

.budget-item .budget-amount {
  font-size: 1.2rem;
  font-weight: 900;
  color: var(--color-primary);
}

.budget-total {
  margin-top: var(--space-lg);
  padding-top: var(--space-md);
  border-top: 2px dashed var(--color-border);
  font-family: var(--font-heading);
  font-size: 1.6rem;
  font-weight: 900;
  text-align: right;
  color: var(--color-text-heading);
  position: relative;
  z-index: 1;
}

.budget-total::before {
  content: '总预算 ';
  font-size: var(--font-size-body);
  color: var(--color-text-secondary);
  font-weight: 400;
}

.xhs-section {
  background: var(--color-surface);
  padding: var(--space-xl) var(--space-lg);
  margin: var(--space-lg) 0;
  position: relative;
  border: 2px solid var(--color-border);
  border-radius: 0;
}

.xhs-section::before {
  content: '';
  position: absolute;
  top: -5px;
  left: 20px;
  right: 20px;
  height: 10px;
  background: repeating-linear-gradient(90deg, var(--color-accent) 0px, var(--color-accent) 8px, transparent 8px, transparent 16px);
}

.xhs-note {
  padding: var(--space-md) 0;
  border-bottom: 1px dotted var(--color-border);
  position: relative;
  padding-left: var(--space-xl);
}

.xhs-note::before {
  content: '📌';
  position: absolute;
  left: 0;
  top: var(--space-md);
  font-size: 1.2rem;
}

.xhs-note:last-child {
  border-bottom: none;
}

.tips-section,
.emergency-section,
.packing-section {
  background: var(--color-surface);
  padding: var(--space-xl) var(--space-lg);
  margin: var(--space-lg) 0;
  border-left: 6px solid var(--color-secondary);
  position: relative;
}

.tips-section::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 60px;
  height: 60px;
  background: radial-gradient(circle, rgba(244,162,97,0.15) 0%, transparent 70%);
}

.emergency-section {
  border-left-color: var(--color-primary);
}

.packing-section {
  border-left-color: var(--color-accent);
}

.tips-section h2,
.emergency-section h2,
.packing-section h2 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h2);
  font-weight: 800;
  color: var(--color-text-heading);
  margin-bottom: var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.tips-section h2::before {
  content: '✦';
  color: var(--color-accent);
}

.emergency-section h2::before {
  content: '⚠️';
}

.packing-section h2::before {
  content: '🎒';
}

.tips-section ul,
.emergency-section ul,
.packing-section ul {
  list-style: none;
  padding-left: 0;
}

.tips-section li,
.emergency-section li,
.packing-section li {
  padding: var(--space-sm) 0;
  padding-left: var(--space-xl);
  position: relative;
  border-bottom: 1px dashed rgba(43,43,43,0.1);
}

.tips-section li::before,
.emergency-section li::before,
.packing-section li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--color-primary);
  font-weight: bold;
}

.verification-badge {
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  padding: 0.3em 0.8em;
  border: 1px solid var(--color-border);
  display: inline-block;
  background: rgba(255,255,255,0.9);
}

.verification-badge.community-match {
  border-color: var(--color-primary);
  color: var(--color-primary);
}

.verification-badge.community-only {
  border-color: var(--color-secondary);
  color: var(--color-secondary);
}

footer {
  background: var(--color-surface);
  padding: var(--space-xl) var(--space-lg);
  margin-top: var(--space-xl);
  text-align: center;
  border-top: 2px solid var(--color-border);
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
  position: relative;
}

footer::before {
  content: '';
  display: block;
  width: 100px;
  height: 3px;
  background: var(--color-accent);
  margin: 0 auto var(--space-md);
}
</style>
{% endblock %}

{% block header_decor %}
<div class="hero-decor" aria-hidden="true">
  <svg class="hero-svg-decor" viewBox="0 0 200 200" preserveAspectRatio="none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;">
    <path d="M20,180 Q 60,150 80,170 T 140,160" stroke="rgba(230,57,70,0.2)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <circle cx="180" cy="30" r="8" fill="rgba(244,162,97,0.3)"/>
    <circle cx="170" cy="50" r="12" fill="rgba(29,53,87,0.1)"/>
    <path d="M10,20 L 30,10 L 50,30 Z" fill="none" stroke="rgba(230,57,70,0.15)" stroke-width="1.5"/>
  </svg>
</div>
{% endblock %}

{% block footer_decor %}
<div class="footer-decor" aria-hidden="true">
  <svg width="100" height="20" viewBox="0 0 100 20" style="display: block; margin: 0 auto 1rem;">
    <path d="M10,10 Q30,5 50,10 T90,10" stroke="var(--color-accent)" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <circle cx="20" cy="15" r="2" fill="var(--color-primary)" opacity="0.5"/>
    <circle cx="80" cy="15" r="2" fill="var(--color-primary)" opacity="0.5"/>
  </svg>
</div>
{% endblock %}
