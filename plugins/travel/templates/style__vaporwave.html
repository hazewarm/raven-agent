{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
    /* === 蒸汽波色彩体系 === */
    --color-bg: #0b001a;
    --color-surface: rgba(22, 8, 48, 0.88);
    --color-primary: #ff66b2;
    --color-secondary: #00d4ff;
    --color-accent: #ffb847;
    --color-text: #f0e0ff;
    --color-text-secondary: #c4a8e0;
    --color-text-heading: #ff8dc7;
    --color-border: rgba(255, 102, 178, 0.45);
    --color-shadow: rgba(255, 102, 178, 0.25);
    --font-heading: 'Noto Serif SC', 'Times New Roman', serif;
    --font-body: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    --font-mono: 'Courier New', 'Source Code Pro', monospace;
    --font-size-h1: 2.25rem;
    --font-size-h2: 1.35rem;
    --font-size-h3: 1.1rem;
    --font-size-body: 0.95rem;
    --font-size-small: 0.8rem;
    --line-height: 1.7;
    --space-xs: 0.25rem;
    --space-sm: 0.5rem;
    --space-md: 1rem;
    --space-lg: 1.0rem;
    --space-xl: 2rem;
    --space-xxl: 3rem;
    --radius-sm: 2px;
    --radius-md: 4px;
    --radius-lg: 8px;
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
}
</style>
{% endblock %}

{% block style_css %}
<style>
/* ===== 容器宽度约束 ===== */
main, .container, .max-w-2xl {
    max-width: 720px;
    margin: 0 auto;
}

/* ===== 全局页面背景 —— 深空网格+扫描线 ===== */
body {
    background-color: #0b001a;
    background-image:
        /* 扫描线 */
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(255, 255, 255, 0.018) 2px,
            rgba(255, 255, 255, 0.018) 3px
        ),
        /* 透视网格地面渐变 */
        linear-gradient(
            180deg,
            rgba(255, 102, 178, 0.06) 0%,
            rgba(0, 212, 255, 0.1) 40%,
            rgba(0, 212, 255, 0.04) 70%,
            rgba(11, 0, 26, 0.95) 100%
        ),
        /* 水平网格线 */
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 28px,
            rgba(255, 102, 178, 0.07) 28px,
            rgba(255, 102, 178, 0.07) 29px
        ),
        /* 垂直网格线 */
        repeating-linear-gradient(
            90deg,
            transparent,
            transparent 28px,
            rgba(0, 212, 255, 0.05) 28px,
            rgba(0, 212, 255, 0.05) 29px
        );
    background-attachment: fixed;
    color: var(--color-text);
    font-family: var(--font-body);
}

/* ===== Hero 封面区 ===== */
.hero {
    position: relative;
    background: linear-gradient(
        175deg,
        #1a0040 0%,
        #2d0058 15%,
        #4a0078 30%,
        #8b1a5e 50%,
        #ff4d7a 70%,
        #ff8c42 85%,
        #00d4ff 100%
    );
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    padding: var(--space-xxl) var(--space-lg) var(--space-xl);
    margin-bottom: var(--space-lg);
    text-align: center;
    overflow: hidden;
    isolation: isolate;
    box-shadow:
        0 8px 40px rgba(255, 102, 178, 0.3),
        0 0 120px rgba(0, 212, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    border-bottom: 2px solid rgba(255, 102, 178, 0.5);
}

/* Hero 扫描线叠加 */
.hero::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.06) 3px,
        rgba(0, 0, 0, 0.06) 5px
    );
    border-radius: inherit;
}

/* Hero VHS 色散光晕 */
.hero::after {
    content: '';
    position: absolute;
    inset: -20px;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 60%, rgba(255, 102, 178, 0.25) 0%, transparent 65%),
                radial-gradient(ellipse at 30% 50%, rgba(0, 212, 255, 0.18) 0%, transparent 60%);
    animation: heroGlow 4s ease-in-out infinite alternate;
}

@keyframes heroGlow {
    0% { opacity: 0.7; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.04); }
}

.hero h1 {
    position: relative;
    z-index: 3;
    font-family: var(--font-heading);
    font-size: var(--font-size-h1);
    color: #fff;
    text-shadow:
        0 0 20px rgba(255, 102, 178, 0.9),
        0 0 40px rgba(255, 102, 178, 0.5),
        0 0 80px rgba(0, 212, 255, 0.4),
        0 2px 4px rgba(0, 0, 0, 0.5),
        3px 0 0 rgba(0, 212, 255, 0.3),
        -1px 0 0 rgba(255, 102, 178, 0.3);
    letter-spacing: 0.08em;
    margin-bottom: var(--space-sm);
}

.hero .subtitle {
    position: relative;
    z-index: 3;
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.hero .weather-overview,
.hero .budget-overview {
    position: relative;
    z-index: 3;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 0 0 8px rgba(255, 102, 178, 0.4);
}

.hero .budget-overview {
    display: inline-block;
    background: rgba(10, 0, 20, 0.55);
    border: 1px solid rgba(255, 184, 71, 0.5);
    border-radius: var(--radius-sm);
    padding: var(--space-xs) var(--space-md);
    color: #ffe0b0;
    text-shadow: 0 0 10px rgba(255, 184, 71, 0.6);
    box-shadow: 0 0 12px rgba(255, 184, 71, 0.2);
}

/* ===== 每日行程卡片 ===== */
.day-card {
    position: relative;
    background:
        linear-gradient(135deg, rgba(30, 10, 60, 0.9) 0%, rgba(20, 8, 40, 0.92) 100%);
    border: 2px solid rgba(255, 102, 178, 0.35);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-lg);
    box-shadow:
        0 4px 20px rgba(255, 102, 178, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    overflow: hidden;
    isolation: isolate;
}

/* 卡片扫描线 */
.day-card::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 255, 255, 0.012) 2px,
        rgba(255, 255, 255, 0.012) 4px
    );
    border-radius: inherit;
}

/* 卡片左上角霓虹斜切装饰 */
.day-card::after {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    width: 40px;
    height: 40px;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.7) 0%, transparent 50%);
    border-radius: var(--radius-md) 0 0 0;
    clip-path: polygon(0 0, 100% 0, 0 100%);
}

.day-card h2 {
    position: relative;
    z-index: 2;
    font-family: var(--font-heading);
    font-size: var(--font-size-h2);
    color: var(--color-text-heading);
    text-shadow: 0 0 12px rgba(255, 102, 178, 0.5);
    margin-bottom: var(--space-sm);
    padding-left: 0.6em;
}

/* 标题前霓虹菱形 */
.day-card h2::before {
    content: '◆';
    position: absolute;
    left: -0.1em;
    font-size: 0.5em;
    color: var(--color-secondary);
    text-shadow:
        0 0 8px rgba(0, 212, 255, 0.9),
        0 0 16px rgba(0, 212, 255, 0.5);
    top: 50%;
    transform: translateY(-50%);
}

.day-card .day-theme {
    position: relative;
    z-index: 2;
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-secondary);
    text-shadow: 0 0 6px rgba(0, 212, 255, 0.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: var(--space-md);
    padding: 0.25em 0.6em;
    border-left: 3px solid rgba(0, 212, 255, 0.5);
    background: rgba(0, 212, 255, 0.06);
}

.day-card .weather-badge {
    position: relative;
    z-index: 2;
    display: inline-block;
    background: rgba(255, 102, 178, 0.2);
    border: 1px solid rgba(255, 102, 178, 0.4);
    border-radius: var(--radius-sm);
    padding: 0.2em 0.6em;
    font-size: var(--font-size-small);
    color: #ffb0d0;
    text-shadow: 0 0 6px rgba(255, 102, 178, 0.4);
    margin-bottom: var(--space-md);
}

/* 活动项 */
.activity-item {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 102, 178, 0.2);
    border-radius: var(--radius-sm);
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.activity-item:hover {
    border-color: rgba(0, 212, 255, 0.5);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
}

.activity-item h3 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h3);
    color: #ffb8d8;
    text-shadow: 0 0 6px rgba(255, 102, 178, 0.3);
    margin-bottom: var(--space-xs);
}

.activity-item .activity-order {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-secondary);
    text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
}

.activity-item .activity-time {
    font-family: var(--font-mono);
    color: var(--color-accent);
    text-shadow: 0 0 5px rgba(255, 184, 71, 0.5);
}

.activity-item .activity-desc {
    color: var(--color-text-secondary);
    line-height: var(--line-height);
}

.activity-item .activity-location a {
    color: var(--color-secondary);
    text-decoration: none;
    border-bottom: 1px dashed rgba(0, 212, 255, 0.4);
    transition: all var(--transition-fast);
}

.activity-item .activity-location a:hover {
    color: #fff;
    border-bottom-color: #fff;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
}

.activity-item .transport-info,
.activity-item .meal-info {
    color: var(--color-text-secondary);
    font-size: var(--font-size-small);
}

/* 地图容器 */
.day-map {
    position: relative;
    z-index: 2;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 2px solid rgba(0, 212, 255, 0.25);
    margin-top: var(--space-md);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
}

/* 酒店信息 */
.hotel-info {
    position: relative;
    z-index: 2;
    background: rgba(255, 184, 71, 0.06);
    border: 1px solid rgba(255, 184, 71, 0.3);
    border-radius: var(--radius-sm);
    padding: var(--space-md);
    margin-top: var(--space-md);
    font-size: var(--font-size-small);
    color: #ffe0b0;
}

/* ===== 预算区域 —— 老式电脑界面风格 ===== */
.budget-section {
    position: relative;
    background: rgba(20, 8, 40, 0.9);
    border: 2px solid rgba(0, 212, 255, 0.35);
    border-radius: var(--radius-md);
    padding: 0;
    margin-bottom: var(--space-lg);
    overflow: hidden;
    box-shadow:
        0 4px 20px rgba(0, 212, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
}

/* Windows 95 风格标题栏 */
.budget-section::before {
    content: '💾 BUDGET.EXE';
    display: block;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: #fff;
    background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
    padding: 0.35em 0.8em;
    letter-spacing: 0.06em;
    border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
}

.budget-section .budget-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    padding: var(--space-lg);
    position: relative;
    z-index: 1;
}

.budget-section .budget-item {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: 0.5em 0;
    border-bottom: 1px solid rgba(255, 102, 178, 0.15);
    font-family: var(--font-mono);
    font-size: var(--font-size-body);
    color: var(--color-text);
    position: relative;
    z-index: 1;
}

.budget-section .budget-item .budget-amount {
    margin-left: auto;
}

.budget-section .budget-item:last-of-type {
    border-bottom: none;
}

.budget-section .budget-total {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    color: var(--color-accent);
    text-shadow: 0 0 8px rgba(255, 184, 71, 0.6);
    padding: var(--space-md) var(--space-lg);
    border-top: 2px solid rgba(255, 184, 71, 0.3);
    margin-top: var(--space-sm);
    text-align: right;
    position: relative;
    z-index: 1;
}

/* 预算区扫描线 */
.budget-section::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
    );
    border-radius: inherit;
}

/* ===== 小红书攻略区 ===== */
.xhs-section {
    position: relative;
    background: rgba(28, 10, 55, 0.85);
    border: 2px solid rgba(255, 102, 178, 0.3);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-lg);
    overflow: hidden;
    isolation: isolate;
}

/* 小红书区右上角雕塑装饰 */
.xhs-section::before {
    content: '🗽';
    position: absolute;
    top: -15px;
    right: 15px;
    font-size: 3rem;
    opacity: 0.15;
    z-index: 0;
    pointer-events: none;
    transform: rotate(8deg);
    filter: grayscale(0.5) brightness(1.3);
}

.xhs-section::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255, 102, 178, 0.015) 3px,
        rgba(255, 102, 178, 0.015) 5px
    );
    border-radius: inherit;
}

.xhs-section h2,
.xhs-section h3 {
    position: relative;
    z-index: 1;
    font-family: var(--font-heading);
    color: var(--color-text-heading);
    text-shadow: 0 0 10px rgba(255, 102, 178, 0.4);
}

.xhs-section .xhs-note {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.015);
    border: 1px solid rgba(255, 102, 178, 0.2);
    border-radius: var(--radius-sm);
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
}

/* ===== 旅行贴士区 ===== */
.tips-section {
    position: relative;
    background: rgba(22, 10, 45, 0.85);
    border: 2px solid rgba(0, 212, 255, 0.25);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-lg);
    isolation: isolate;
}

/* 棕榈叶角标 */
.tips-section::before {
    content: '🌴';
    position: absolute;
    bottom: -10px;
    left: 10px;
    font-size: 2.5rem;
    opacity: 0.2;
    z-index: 0;
    pointer-events: none;
    transform: rotate(-15deg) scaleX(-1);
}

.tips-section h2 {
    position: relative;
    z-index: 1;
    font-family: var(--font-heading);
    color: var(--color-text-heading);
    text-shadow: 0 0 10px rgba(255, 102, 178, 0.4);
}

.tips-section ul {
    position: relative;
    z-index: 1;
    list-style: none;
    padding-left: 0;
}

.tips-section ul li {
    position: relative;
    padding-left: 1.6em;
    margin-bottom: 0.6em;
    color: var(--color-text);
    line-height: var(--line-height);
}

/* 霓虹圆点列表标记 */
.tips-section ul li::before {
    content: '';
    position: absolute;
    left: 0.2em;
    top: 0.55em;
    width: 8px;
    height: 8px;
    background: var(--color-secondary);
    border-radius: 50%;
    box-shadow:
        0 0 6px rgba(0, 212, 255, 0.8),
        0 0 14px rgba(0, 212, 255, 0.4);
}

/* ===== 紧急信息区 ===== */
.emergency-section {
    position: relative;
    background: rgba(30, 5, 20, 0.9);
    border: 2px solid rgba(255, 70, 100, 0.5);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-lg);
    isolation: isolate;
    box-shadow:
        0 0 25px rgba(255, 70, 100, 0.2),
        inset 0 0 30px rgba(255, 70, 100, 0.04);
}

/* 紧急区脉冲边框 */
.emergency-section::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: calc(var(--radius-md) + 4px);
    border: 1px solid rgba(255, 70, 100, 0.25);
    z-index: 0;
    pointer-events: none;
    animation: emergencyPulse 2s ease-in-out infinite;
}

@keyframes emergencyPulse {
    0%, 100% { border-color: rgba(255, 70, 100, 0.2); }
    50% { border-color: rgba(255, 70, 100, 0.5); }
}

.emergency-section h2 {
    position: relative;
    z-index: 1;
    font-family: var(--font-heading);
    color: #ff6070;
    text-shadow: 0 0 15px rgba(255, 70, 100, 0.6);
}

.emergency-section p,
.emergency-section ul,
.emergency-section li {
    position: relative;
    z-index: 1;
    color: #ffc0c8;
}

/* ===== 行李清单区 ===== */
.packing-section {
    position: relative;
    background: rgba(18, 12, 38, 0.85);
    border: 2px solid rgba(255, 184, 71, 0.3);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-lg);
    isolation: isolate;
}

/* 老式复选框网格背景 */
.packing-section::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 20px,
            rgba(255, 184, 71, 0.03) 20px,
            rgba(255, 184, 71, 0.03) 21px
        ),
        repeating-linear-gradient(
            90deg,
            transparent,
            transparent 20px,
            rgba(255, 184, 71, 0.03) 20px,
            rgba(255, 184, 71, 0.03) 21px
        );
    border-radius: inherit;
}

.packing-section h2 {
    position: relative;
    z-index: 1;
    font-family: var(--font-heading);
    color: var(--color-accent);
    text-shadow: 0 0 10px rgba(255, 184, 71, 0.5);
}

.packing-section ul {
    position: relative;
    z-index: 1;
    list-style: none;
    padding-left: 0;
}

.packing-section ul li {
    position: relative;
    padding-left: 1.8em;
    margin-bottom: 0.5em;
    color: var(--color-text);
}

/* 老式复选框标记 */
.packing-section ul li::before {
    content: '☐';
    position: absolute;
    left: 0;
    color: rgba(255, 184, 71, 0.7);
    font-size: 0.9em;
    text-shadow: 0 0 4px rgba(255, 184, 71, 0.5);
}

/* ===== Footer ===== */
footer {
    position: relative;
    background: rgba(10, 5, 25, 0.9);
    border-top: 2px solid rgba(255, 102, 178, 0.3);
    padding: var(--space-xl) var(--space-lg);
    text-align: center;
    color: var(--color-text-secondary);
    font-size: var(--font-size-small);
    isolation: isolate;
    overflow: hidden;
}

footer::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(255, 255, 255, 0.015) 2px,
            rgba(255, 255, 255, 0.015) 3px
        );
}

footer p {
    position: relative;
    z-index: 1;
}

/* ===== 可信度徽章 ===== */
.verification-badge.community-match,
.verification-badge.community-only {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    border: 1px solid rgba(0, 212, 255, 0.35);
    background: rgba(0, 212, 255, 0.08);
    border-radius: var(--radius-sm);
    padding: 0.3em 0.7em;
    color: var(--color-secondary);
    text-shadow: 0 0 6px rgba(0, 212, 255, 0.4);
}

/* 通用霓虹链接 */
.xhs-note a,
footer a {
    color: var(--color-secondary);
    transition: all var(--transition-fast);
}

.xhs-note a:hover,
footer a:hover {
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
}

/* ===== 装饰元素风格 ===== */
.btn {
    font-family: var(--font-mono);
    background: rgba(255, 102, 178, 0.2);
    border: 1px solid rgba(255, 102, 178, 0.4);
    color: #ffb0d0;
    padding: 0.5em 1.2em;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--transition-normal);
    text-shadow: 0 0 5px rgba(255, 102, 178, 0.3);
}

.btn:hover {
    background: rgba(255, 102, 178, 0.35);
    border-color: rgba(255, 102, 178, 0.7);
    box-shadow: 0 0 20px rgba(255, 102, 178, 0.3);
    color: #fff;
}

/* ===== 响应式调整 ===== */
@media (max-width: 480px) {
    .hero {
        padding: var(--space-xl) var(--space-md) var(--space-lg);
    }
    .hero h1 {
        font-size: 1.6rem;
    }
    .day-card {
        padding: var(--space-md);
    }
    .day-card::after {
        width: 28px;
        height: 28px;
    }
    .budget-section::before {
        font-size: 0.65rem;
    }
    .xhs-section::before {
        font-size: 2rem;
        top: -8px;
        right: 8px;
    }
    .tips-section::before {
        font-size: 1.8rem;
    }
}
</style>
{% endblock %}
