{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
    /* === 后现代解构色彩体系 === */
    /* 暖白基底——模拟略带纹理的复印纸 */
    --color-bg: #f7f3ee;
    /* 纯白表面——带微妙的暖色偏移 */
    --color-surface: #fffef9;
    /* 电光洋红——高冲击力主色 */
    --color-primary: #ff1a5e;
    /* 深电蓝——冷冽的辅色，与暖白形成张力 */
    --color-secondary: #0a1f44;
    /* 酸性黄绿——刺眼的强调色 */
    --color-accent: #c8ff00;
    /* 深黑文字——高对比，确保可读性 */
    --color-text: #161310;
    /* 暖灰辅文字——适度的退让 */
    --color-text-secondary: #6b5d55;
    /* 标题用深色——近乎黑但略带暖意 */
    --color-text-heading: #0d0a07;
    /* 不规则边框色——暖灰带粉 */
    --color-border: #c4b5aa;
    /* 硬偏移阴影——复印机错位效果 */
    --color-shadow: rgba(10, 31, 68, 0.18);

    /* === 字体体系 === */
    --font-heading: 'Noto Serif SC', 'Times New Roman', serif;
    --font-body: 'Noto Sans SC', 'Helvetica Neue', sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

    /* === 字号——刻意的对比与张力 === */
    --font-size-h1: 3.2rem;
    --font-size-h2: 2rem;
    --font-size-h3: 1.25rem;
    --font-size-body: 0.95rem;
    --font-size-small: 0.72rem;
    --line-height: 1.55;

    /* === 间距——非对称节奏 === */
    --space-xs: 0.3rem;
    --space-sm: 0.7rem;
    --space-md: 1.2rem;
    --space-lg: 2rem;
    --space-xl: 3rem;
    --space-xxl: 5rem;

    /* === 圆角——不完美的弧度 === */
    --radius-sm: 3px 12px 3px 8px;
    --radius-md: 6px 20px 4px 14px;
    --radius-lg: 10px 28px 8px 20px;

    /* === 过渡 === */
    --transition-fast: 0.12s cubic-bezier(0.25, 0, 0.25, 1);
    --transition-normal: 0.28s cubic-bezier(0.25, 0, 0.25, 1);
}
</style>
{% endblock %}

{% block style_css %}
<style>
/* ============================================================
   后现代解构风格 —— 受David Carson & Wolfgang Weingart启发
   控制的混乱，破碎的网格，不和谐的和谐
   ============================================================ */

/* --- 限制主容器宽度，避免桌面端铺满全屏 --- */
main, .container, .max-w-2xl {
    max-width: 720px;
    margin: 0 auto;
}

/* --- Hero封面区 --- */
.hero {
    position: relative;
    background: var(--color-bg);
    padding: var(--space-xl) var(--space-md) var(--space-lg);
    overflow: hidden;
    border-bottom: 5px solid var(--color-primary);
    border-bottom-style: dashed;
    margin-bottom: var(--space-lg);
    clip-path: polygon(0 0, 100% 0, 100% 96%, 98% 100%, 2% 100%, 0 97%);
}

.hero h1 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h1);
    color: var(--color-text-heading);
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    margin: 0 0 var(--space-sm) 0;
    position: relative;
    z-index: 2;
    /* 多重偏移阴影——丝印错位效果 */
    text-shadow:
        -3px -3px 0 var(--color-accent),
        4px 3px 0 var(--color-primary),
        -6px 0px 0 rgba(255, 26, 94, 0.25);
    transform: rotate(-0.6deg);
    transform-origin: left bottom;
    word-break: break-word;
}

.hero .subtitle {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-text-secondary);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
    display: inline-block;
    background: var(--color-surface);
    padding: var(--space-xs) var(--space-sm);
    border: 2px solid var(--color-secondary);
    border-width: 1px 4px 3px 1px;
    transform: rotate(1.2deg);
    margin-left: 8%;
    margin-bottom: var(--space-md);
}

.hero .weather-overview,
.hero .budget-overview {
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    color: var(--color-text);
    position: relative;
    z-index: 2;
    display: inline-block;
    background: var(--color-surface);
    padding: var(--space-sm) var(--space-md);
    margin: var(--space-xs);
    border: 2px solid var(--color-border);
    border-radius: var(--radius-sm);
    transform: rotate(-0.3deg);
    box-shadow:
        6px 6px 0 var(--color-shadow),
        -2px -2px 0 var(--color-accent);
}

.hero .weather-overview {
    transform: rotate(-0.8deg);
}

.hero .budget-overview {
    transform: rotate(0.5deg);
    margin-left: 5%;
}

/* --- 每日行程卡片 --- */
.day-card {
    background: var(--color-surface);
    margin-bottom: var(--space-xl);
    padding: var(--space-lg) var(--space-md);
    position: relative;
    border: 3px solid var(--color-secondary);
    border-width: 2px 5px 4px 2px;
    border-radius: var(--radius-lg);
    /* 微倾斜——打破完美对齐 */
    transform: rotate(-0.35deg);
    box-shadow:
        10px 10px 0 var(--color-shadow),
        -3px -3px 0 var(--color-primary);
    transition: transform var(--transition-normal), box-shadow var(--transition-normal);
}

.day-card:nth-child(even) {
    transform: rotate(0.5deg);
    border-width: 4px 2px 2px 5px;
    box-shadow:
        -8px 10px 0 var(--color-shadow),
        3px -3px 0 var(--color-accent);
}

.day-card:nth-child(3n) {
    transform: rotate(-0.7deg);
    border-color: var(--color-primary);
    border-width: 3px 4px 4px 3px;
    box-shadow:
        7px -6px 0 var(--color-shadow),
        -4px 4px 0 var(--color-secondary);
}

.day-card:nth-child(5n+1) {
    transform: rotate(0.25deg);
}

.day-card h2 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h2);
    color: var(--color-text-heading);
    margin: 0 0 var(--space-xs) 0;
    letter-spacing: -0.02em;
    position: relative;
    display: inline-block;
    /* 文字描边叠加层 */
    -webkit-text-stroke: 1px var(--color-primary);
    paint-order: stroke fill;
    text-stroke: 1px var(--color-primary);
}

.day-card .day-theme {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-primary);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: var(--space-md);
    padding-left: var(--space-md);
    border-left: 12px solid var(--color-accent);
    display: block;
    transform: skewX(-3deg);
    background: linear-gradient(90deg, transparent 0%, var(--color-bg) 100%);
}

.day-card .weather-badge {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    background: var(--color-secondary);
    color: var(--color-accent);
    padding: var(--space-xs) var(--space-sm);
    display: inline-block;
    border-radius: var(--radius-sm);
    letter-spacing: 0.08em;
    transform: rotate(2deg);
    margin-bottom: var(--space-md);
    box-shadow: 3px 3px 0 var(--color-primary);
}

/* --- 活动条目 --- */
.activity-item {
    position: relative;
    padding: var(--space-md) var(--space-sm) var(--space-md) var(--space-lg);
    margin-bottom: var(--space-md);
    border-bottom: 2px dotted var(--color-border);
    border-bottom-width: 1px 1px 3px 1px;
    transition: transform var(--transition-fast);
}

.activity-item:nth-child(odd) {
    padding-left: var(--space-lg);
    padding-right: var(--space-sm);
    text-align: left;
    border-left: 6px solid var(--color-primary);
    border-right: none;
    margin-left: 0;
}

.activity-item:nth-child(even) {
    padding-left: var(--space-sm);
    padding-right: var(--space-lg);
    text-align: right;
    border-right: 6px solid var(--color-secondary);
    border-left: none;
    margin-right: 0;
}

.activity-item h3 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h3);
    color: var(--color-text-heading);
    margin: 0 0 var(--space-xs) 0;
    letter-spacing: -0.01em;
    position: relative;
}

.activity-item:nth-child(even) h3 {
    font-family: var(--font-body);
    font-weight: 700;
    letter-spacing: 0.04em;
}

.activity-item .activity-order {
    font-family: var(--font-mono);
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--color-primary);
    opacity: 0.7;
    position: absolute;
    top: -8px;
    left: -6px;
    line-height: 1;
    z-index: 0;
    pointer-events: none;
}

.activity-item:nth-child(even) .activity-order {
    left: auto;
    right: -6px;
    color: var(--color-secondary);
    opacity: 0.6;
}

.activity-item .activity-time {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-text-secondary);
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: var(--space-xs);
    position: relative;
    z-index: 1;
}

.activity-item .activity-desc {
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    color: var(--color-text);
    line-height: var(--line-height);
    position: relative;
    z-index: 1;
    margin-bottom: var(--space-sm);
}

.activity-item .activity-location {
    font-family: var(--font-body);
    font-size: var(--font-size-small);
    display: inline-block;
}

.activity-item .activity-location a {
    color: var(--color-secondary);
    text-decoration: none;
    border-bottom: 3px solid var(--color-accent);
    padding-bottom: 2px;
    transition: border-color var(--transition-fast);
}

.activity-item .activity-location a:hover {
    border-bottom-color: var(--color-primary);
    border-bottom-width: 5px;
}

.activity-item .transport-info,
.activity-item .meal-info {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-text-secondary);
    display: inline-block;
    background: var(--color-bg);
    padding: 2px 8px;
    margin: 2px 4px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    letter-spacing: 0.04em;
}

/* --- 地图容器 --- */
.day-map {
    width: 100%;
    height: 240px;
    margin-top: var(--space-md);
    margin-bottom: var(--space-md);
    border: 4px solid var(--color-secondary);
    border-width: 3px 6px 5px 3px;
    border-radius: var(--radius-md);
    box-shadow:
        8px 8px 0 var(--color-shadow),
        -2px -2px 0 var(--color-primary);
    overflow: hidden;
    position: relative;
    /* 特别注意：不对.day-map使用filter/opacity/mix-blend-mode/backdrop-filter */
}

/* --- 酒店信息 --- */
.hotel-info {
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    color: var(--color-text);
    background: var(--color-bg);
    padding: var(--space-md);
    margin-top: var(--space-md);
    border: 2px dashed var(--color-border);
    border-radius: var(--radius-sm);
    transform: rotate(0.3deg);
    position: relative;
}

.hotel-info::before {
    content: '🏨';
    position: absolute;
    top: -14px;
    left: 12px;
    font-size: 1.5rem;
    z-index: 2;
    background: var(--color-bg);
    padding: 0 6px;
}

/* --- 预算区域 --- */
.budget-section {
    background: var(--color-surface);
    padding: var(--space-lg) var(--space-md);
    margin: var(--space-xl) 0;
    border: 4px solid var(--color-secondary);
    border-width: 5px 2px 3px 5px;
    border-radius: var(--radius-lg);
    transform: rotate(-0.5deg);
    box-shadow: -8px 8px 0 var(--color-primary);
    position: relative;
}

.budget-section::after {
    content: '';
    position: absolute;
    top: -8px;
    right: -8px;
    width: 40px;
    height: 40px;
    background: var(--color-accent);
    z-index: -1;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}

.budget-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
}

.budget-item {
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    padding: var(--space-sm) var(--space-md);
    background: var(--color-bg);
    border: 2px solid var(--color-border);
    border-radius: var(--radius-sm);
    transform: rotate(-0.2deg);
    position: relative;
}

.budget-item:nth-child(even) {
    transform: rotate(0.4deg);
    border-color: var(--color-secondary);
    border-width: 1px 3px 3px 1px;
}

.budget-item:nth-child(3n) {
    transform: rotate(-0.6deg);
    border-color: var(--color-primary);
}

.budget-total {
    font-family: var(--font-heading);
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--color-text-heading);
    text-align: right;
    padding: var(--space-md);
    margin-top: var(--space-md);
    background: var(--color-accent);
    border: 3px solid var(--color-secondary);
    border-radius: var(--radius-sm);
    transform: rotate(0.7deg);
    letter-spacing: 0.06em;
    box-shadow: 6px 6px 0 var(--color-shadow);
}

/* --- 小红书攻略区 --- */
.xhs-section {
    background: var(--color-surface);
    padding: var(--space-lg) var(--space-md);
    margin: var(--space-xl) 0;
    border: 3px solid var(--color-primary);
    border-width: 3px 1px 5px 3px;
    border-radius: var(--radius-lg);
    transform: rotate(0.4deg);
    box-shadow: -6px 8px 0 var(--color-shadow);
    position: relative;
}

.xhs-section::before {
    content: '📕';
    position: absolute;
    top: -18px;
    right: 20px;
    font-size: 2rem;
    z-index: 3;
    background: var(--color-surface);
    padding: 0 8px;
    transform: rotate(-8deg);
}

.xhs-note {
    background: var(--color-bg);
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    border: 2px solid var(--color-border);
    border-radius: var(--radius-md);
    transform: rotate(-0.5deg);
    position: relative;
    transition: transform var(--transition-normal);
}

.xhs-note:nth-child(even) {
    transform: rotate(0.6deg);
    margin-left: 4%;
    border-color: var(--color-primary);
}

.xhs-note:nth-child(3n) {
    transform: rotate(-0.3deg);
    margin-left: -2%;
    border-color: var(--color-secondary);
    border-width: 1px 4px 2px 1px;
}

.xhs-note p[style*="color"] {
    color: var(--color-primary) !important;
}

/* --- 旅行贴士区 --- */
.tips-section {
    background: var(--color-secondary);
    color: var(--color-surface);
    padding: var(--space-lg) var(--space-md);
    margin: var(--space-xl) 0;
    border-radius: var(--radius-lg);
    transform: rotate(-0.4deg);
    box-shadow: 10px 10px 0 var(--color-primary);
    position: relative;
}

.tips-section ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.tips-section li {
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    padding: var(--space-sm) 0;
    padding-left: var(--space-lg);
    position: relative;
    border-bottom: 1px dashed rgba(255, 255, 249, 0.3);
}

.tips-section li::before {
    content: '⚠';
    position: absolute;
    left: 0;
    top: var(--space-sm);
    color: var(--color-accent);
    font-size: var(--font-size-small);
    transform: rotate(5deg);
}

.tips-section li:nth-child(even)::before {
    content: '✦';
    transform: rotate(-8deg);
    color: var(--color-primary);
}

/* --- 紧急信息区 --- */
.emergency-section {
    background: var(--color-primary);
    color: var(--color-surface);
    padding: var(--space-lg) var(--space-md);
    margin: var(--space-xl) 0;
    border: 5px solid var(--color-secondary);
    border-radius: var(--radius-md);
    transform: rotate(0.5deg);
    box-shadow: -6px 8px 0 var(--color-accent);
    font-family: var(--font-body);
    font-size: var(--font-size-body);
}

.emergency-section h2,
.emergency-section h3 {
    color: var(--color-surface);
    font-family: var(--font-heading);
    -webkit-text-stroke: 1px var(--color-accent);
    text-stroke: 1px var(--color-accent);
    paint-order: stroke fill;
    letter-spacing: 0.05em;
}

/* --- 行李清单区 --- */
.packing-section {
    background: var(--color-surface);
    padding: var(--space-lg) var(--space-md);
    margin: var(--space-xl) 0;
    border: 3px dashed var(--color-secondary);
    border-radius: var(--radius-lg);
    transform: rotate(-0.25deg);
    box-shadow: 4px 6px 0 var(--color-shadow);
    position: relative;
}

.packing-section::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 10%;
    width: 80%;
    height: 6px;
    background: repeating-linear-gradient(
        90deg,
        var(--color-primary) 0px,
        var(--color-primary) 8px,
        transparent 8px,
        transparent 16px
    );
}

/* --- 页脚 --- */
footer {
    background: var(--color-secondary);
    color: var(--color-surface);
    padding: var(--space-xl) var(--space-md);
    margin-top: var(--space-xxl);
    text-align: center;
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    letter-spacing: 0.15em;
    border-top: 8px solid var(--color-primary);
    position: relative;
    clip-path: polygon(0 6px, 100% 0, 100% 100%, 0 calc(100% - 6px));
}

/* --- 验证徽章 --- */
.verification-badge.community-match {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    background: var(--color-accent);
    color: var(--color-secondary);
    padding: var(--space-xs) var(--space-sm);
    border: 2px solid var(--color-secondary);
    display: inline-block;
    transform: rotate(-1deg);
    letter-spacing: 0.06em;
    margin: var(--space-sm) 0;
    box-shadow: 3px 3px 0 var(--color-primary);
}

.verification-badge.community-only {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    background: var(--color-bg);
    color: var(--color-text-secondary);
    padding: var(--space-xs) var(--space-sm);
    border: 1px dashed var(--color-border);
    display: inline-block;
    transform: rotate(0.8deg);
    letter-spacing: 0.04em;
}

/* --- 装饰性破碎文字效果（用于强调文本） --- */
.day-card .day-theme strong,
.activity-item .activity-desc strong {
    font-family: var(--font-heading);
    color: var(--color-primary);
    font-weight: 900;
    letter-spacing: 0.06em;
    display: inline-block;
    transform: skewX(-2deg);
    background: linear-gradient(180deg, transparent 55%, var(--color-accent) 55%);
    padding: 0 4px;
}

/* --- 链接通用样式 --- */
.xhs-note a,
footer a {
    color: var(--color-secondary);
    text-decoration: none;
    border-bottom: 2px solid var(--color-accent);
    transition: all var(--transition-fast);
    position: relative;
}

.xhs-note a:hover,
footer a:hover {
    border-bottom-color: var(--color-primary);
    border-bottom-width: 4px;
    color: var(--color-primary);
}

/* --- 无序列表在非tips区域 --- */
.budget-section ul,
.packing-section ul {
    list-style: none;
    padding: 0;
}

.budget-section li,
.packing-section li {
    padding: var(--space-xs) 0;
    padding-left: var(--space-md);
    position: relative;
}

.budget-section li::before {
    content: '○';
    position: absolute;
    left: 0;
    color: var(--color-primary);
    font-size: 0.7rem;
}

.packing-section li::before {
    content: '☐';
    position: absolute;
    left: 0;
    color: var(--color-secondary);
    font-size: 0.8rem;
}

/* --- 响应式微调 --- */
@media (max-width: 672px) {
    .hero h1 {
        font-size: 2.2rem;
        text-shadow:
            -2px -2px 0 var(--color-accent),
            3px 2px 0 var(--color-primary);
    }

    .hero .subtitle {
        margin-left: 2%;
        font-size: 0.65rem;
    }

    .day-card {
        padding: var(--space-md) var(--space-sm);
        transform: rotate(-0.2deg);
    }

    .day-card:nth-child(even) {
        transform: rotate(0.3deg);
    }

    .day-card:nth-child(3n) {
        transform: rotate(-0.4deg);
    }

    .activity-item {
        padding: var(--space-sm) var(--space-xs) var(--space-sm) var(--space-md);
    }

    .activity-item:nth-child(even) {
        padding-left: var(--space-xs);
        padding-right: var(--space-md);
    }

    .budget-grid {
        grid-template-columns: 1fr;
        gap: var(--space-sm);
    }

    .day-map {
        height: 180px;
        border-width: 2px 4px 4px 2px;
    }

    .budget-total {
        font-size: 1.3rem;
    }
}

@media (max-width: 400px) {
    .hero h1 {
        font-size: 1.7rem;
        text-shadow:
