{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
  --color-bg: #F3EFE6;
  --color-surface: #EDE7D9;
  --color-primary: #C62828;
  --color-secondary: #1A237E;
  --color-accent: #FFB300;
  --color-text: #1E1E1E;
  --color-text-secondary: #4E4E4E;
  --color-text-heading: #C62828;
  --color-border: #1E1E1E;
  --color-shadow: rgba(198,40,40,0.25);
  --font-heading: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'Courier New', monospace;
  --font-size-h1: 3.5rem;
  --font-size-h2: 2rem;
  --font-size-h3: 1.5rem;
  --font-size-body: 1rem;
  --font-size-small: 0.875rem;
  --line-height: 1.6;
  --space-xs: 0.25rem;
  --space-sm: 0.5rem;
  --space-md: 1rem;
  --space-lg: 1.5rem;
  --space-xl: 2rem;
  --space-xxl: 3rem;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.3s ease;
}
</style>
{% endblock %}

{% block style_css %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

main, .container, .max-w-2xl {
  max-width: 720px;
  margin: 0 auto;
}

body {
  background-color: var(--color-bg);
  background-image: 
    radial-gradient(circle at 15% 20%, rgba(198,40,40,0.12) 0%, transparent 35%),
    radial-gradient(circle at 85% 75%, rgba(26,35,126,0.08) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,179,0,0.06) 0%, transparent 50%),
    radial-gradient(circle at 30% 80%, rgba(198,40,40,0.1) 0%, transparent 30%);
  background-blend-mode: multiply;
  font-family: var(--font-body);
  color: var(--color-text);
  line-height: var(--line-height);
}

/* ----- Hero ----- */
.hero {
  position: relative;
  padding: var(--space-xxl) var(--space-lg);
  background: var(--color-surface);
  border-bottom: 6px solid var(--color-primary);
  box-shadow: inset 0 -10px 0 rgba(0,0,0,0.05);
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute;
  top: -30px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: var(--color-accent);
  border-radius: 50%;
  opacity: 0.2;
  transform: rotate(15deg);
}
.hero::after {
  content: "● ◆ ▲";
  position: absolute;
  bottom: 10px;
  left: 20px;
  font-size: 2rem;
  letter-spacing: 1rem;
  color: var(--color-primary);
  opacity: 0.3;
  white-space: nowrap;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h1);
  color: var(--color-text-heading);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.1), -2px -2px 0 rgba(255,255,255,0.5);
  position: relative;
  z-index: 1;
  transform: rotate(-1deg);
  letter-spacing: 0.05em;
}
.hero .subtitle {
  font-family: var(--font-heading);
  font-size: 1.2rem;
  color: var(--color-secondary);
  margin-top: var(--space-sm);
  letter-spacing: 0.1em;
  position: relative;
  z-index: 1;
  display: inline-block;
  background: rgba(255,255,255,0.5);
  padding: 0 var(--space-sm);
}
.hero .weather-overview,
.hero .budget-overview {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.7);
  border: 2px solid var(--color-border);
  padding: var(--space-sm) var(--space-md);
  margin-top: var(--space-md);
  display: inline-block;
  font-weight: bold;
  transform: rotate(0.5deg);
  box-shadow: 4px 4px 0 var(--color-primary);
}
.hero .neo-mask {
  position: absolute;
  bottom: 20px;
  right: 30px;
  width: 80px;
  height: 100px;
  border: 4px solid var(--color-border);
  border-radius: 40px;
  background: rgba(255,255,255,0.3);
  transform: rotate(10deg);
  z-index: 0;
}
.neo-mask::before,
.neo-mask::after {
  content: "";
  position: absolute;
  background: var(--color-border);
  border-radius: 50%;
}
.neo-mask::before {
  width: 16px;
  height: 16px;
  top: 25px;
  left: 15px;
  box-shadow: 25px 0 0 var(--color-border);
}
.neo-mask::after {
  width: 20px;
  height: 10px;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 0 0 20px 20px;
  background: transparent;
  border-bottom: 4px solid var(--color-border);
}

/* ----- Day Card ----- */
.day-card {
  position: relative;
  background: var(--color-surface);
  border: 3px solid var(--color-border);
  margin: var(--space-xl) 0;
  padding: var(--space-lg);
  box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
  transition: box-shadow var(--transition-normal);
}
.day-card::before {
  content: "";
  position: absolute;
  top: -10px;
  left: -10px;
  width: 40px;
  height: 40px;
  border-top: 5px solid var(--color-primary);
  border-left: 5px solid var(--color-primary);
}
.day-card::after {
  content: "";
  position: absolute;
  bottom: -10px;
  right: -10px;
  width: 60px;
  height: 60px;
  border-bottom: 5px solid var(--color-secondary);
  border-right: 5px solid var(--color-secondary);
}
.day-card h2 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h2);
  color: var(--color-secondary);
  margin-bottom: var(--space-sm);
  display: flex;
  align-items: center;
}
.day-card h2::before {
  content: "◆";
  color: var(--color-primary);
  margin-right: var(--space-sm);
  font-size: 1.5rem;
}
.day-card .day-theme {
  font-family: var(--font-heading);
  font-size: var(--font-size-h3);
  color: var(--color-accent);
  margin-bottom: var(--space-md);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  border-bottom: 2px dashed var(--color-border);
  padding-bottom: var(--space-sm);
}
.weather-badge {
  display: inline-block;
  background: var(--color-secondary);
  color: white;
  padding: var(--space-xs) var(--space-sm);
  font-family: var(--font-mono);
  font-size: var(--font-size-small);
  border-radius: var(--radius-sm);
  transform: rotate(-2deg);
}

/* Activity */
.activity-item {
  position: relative;
  border-left: 4px solid var(--color-primary);
  padding-left: var(--space-md);
  margin: var(--space-md) 0;
}
.activity-item::before {
  content: "";
  position: absolute;
  left: -9px;
  top: 0;
  width: 14px;
  height: 14px;
  background: var(--color-primary);
  border-radius: 50%;
  border: 2px solid var(--color-bg);
}
.activity-item h3 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h3);
  color: var(--color-text-heading);
  margin-bottom: var(--space-xs);
}
.activity-time {
  font-weight: bold;
  color: var(--color-secondary);
}
.activity-desc {
  color: var(--color-text-secondary);
  font-size: var(--font-size-body);
  line-height: var(--line-height);
}
.activity-location a {
  color: var(--color-primary);
  text-decoration: underline;
  text-decoration-style: wavy;
}
.transport-info,
.meal-info {
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
  margin-top: var(--space-xs);
}
.hotel-info {
  margin-top: var(--space-md);
  padding: var(--space-sm);
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--color-border);
  font-size: var(--font-size-small);
}
.day-map {
  border: 3px solid var(--color-border);
  margin-top: var(--space-md);
  height: 200px;
  background: #e9e9e9;
}

/* ----- Budget Section ----- */
.budget-section {
  margin: var(--space-xl) 0;
  padding: var(--space-lg);
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  position: relative;
}
.budget-section::before {
  content: "¥";
  position: absolute;
  top: -20px;
  left: 20px;
  font-family: var(--font-heading);
  font-size: 3rem;
  color: var(--color-primary);
  opacity: 0.4;
  transform: rotate(-10deg);
}
.budget-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: var(--space-md);
}
.budget-item {
  background: rgba(255,255,255,0.6);
  padding: var(--space-md);
  border: 1px dashed var(--color-border);
  text-align: center;
  position: relative;
}
.budget-item::after {
  content: "";
  position: absolute;
  bottom: -5px;
  left: 20%;
  width: 60%;
  height: 5px;
  background: var(--color-accent);
  transform: skewX(-20deg);
}
.budget-total {
  margin-top: var(--space-lg);
  font-size: 1.5rem;
  font-weight: bold;
  text-align: right;
  color: var(--color-primary);
  font-family: var(--font-heading);
  padding: var(--space-sm) var(--space-md);
  background: rgba(255,255,255,0.8);
  border-top: 3px solid var(--color-border);
  border-bottom: 3px solid var(--color-border);
}

/* ----- Xiaohongshu Section ----- */
.xhs-section {
  margin: var(--space-xl) 0;
  padding: var(--space-lg);
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  position: relative;
}
.xhs-section::before {
  content: "❤";
  position: absolute;
  top: -15px;
  right: 20px;
  font-size: 2rem;
  color: var(--color-primary);
  transform: rotate(15deg);
}
.xhs-note {
  border-left: 5px solid var(--color-accent);
  padding: var(--space-md);
  margin: var(--space-md) 0;
  background: rgba(255,255,255,0.5);
  font-style: italic;
}

/* ----- Tips Section ----- */
.tips-section {
  margin: var(--space-xl) 0;
  padding: var(--space-lg);
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  position: relative;
}
.tips-section ul {
  list-style: none;
  padding-left: 0;
}
.tips-section li {
  position: relative;
  padding-left: 2rem;
  margin: var(--space-sm) 0;
  font-size: var(--font-size-body);
}
.tips-section li::before {
  content: "▲";
  color: var(--color-primary);
  position: absolute;
  left: 0;
  top: 0.1em;
  font-size: 1rem;
}

/* ----- Emergency Section ----- */
.emergency-section {
  margin: var(--space-xl) 0;
  padding: var(--space-lg);
  background: var(--color-primary);
  color: white;
  border: 3px dashed white;
  position: relative;
}
.emergency-section h2 {
  color: var(--color-accent);
  font-family: var(--font-heading);
}
.emergency-section p,
.emergency-section ul {
  color: white;
}

/* ----- Packing Section ----- */
.packing-section {
  margin: var(--space-xl) 0;
  padding: var(--space-lg);
  background: var(--color-surface);
  border: 2px solid var(--color-border);
}
.packing-section ul {
  list-style: none;
  padding-left: 0;
}
.packing-section li {
  position: relative;
  padding-left: 2rem;
  margin: var(--space-sm) 0;
}
.packing-section li::before {
  content: "☐";
  color: var(--color-secondary);
  position: absolute;
  left: 0;
  font-size: 1.2rem;
  line-height: 1;
}

/* ----- Footer ----- */
footer {
  background: var(--color-secondary);
  color: white;
  padding: var(--space-lg);
  text-align: center;
  position: relative;
  margin-top: var(--space-xxl);
}
footer::before {
  content: "";
  position: absolute;
  top: -10px;
  left: 0;
  width: 100%;
  height: 10px;
  background: repeating-linear-gradient(45deg, var(--color-primary) 0, var(--color-primary) 10px, var(--color-accent) 10px, var(--color-accent) 20px);
}
.footer-symbols {
  margin-top: var(--space-md);
  letter-spacing: 0.5rem;
  font-size: 1.5rem;
  opacity: 0.7;
}
.footer-symbols span {
  display: inline-block;
  transform: rotate(5deg);
}
.footer-symbols span:nth-child(2) { transform: rotate(-8deg); color: var(--color-accent); }
.footer-symbols span:nth-child(3) { transform: rotate(12deg); color: var(--color-primary); }
.footer-symbols span:nth-child(4) { transform: rotate(-3deg); }

/* ----- Verification Badges ----- */
.verification-badge.community-match,
.verification-badge.community-only {
  display: inline-block;
  border: 2px solid var(--color-border);
  padding: var(--space-xs) var(--space-sm);
  font-size: var(--font-size-small);
  background: var(--color-accent);
  color: var(--color-text);
  font-weight: bold;
  transform: rotate(-1deg);
  box-shadow: 3px 3px 0 var(--color-primary);
}
</style>
{% endblock %}

{% block header_decor %}
<div class="neo-mask" aria-hidden="true"></div>
{% endblock %}

{% block footer_decor %}
<div class="footer-symbols" aria-hidden="true">
  <span>▲</span><span>●</span><span>◆</span><span>■</span>
</div>
{% endblock %}
