{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
  --color-bg: #F4EFE6;
  --color-surface: #FCFAF5;
  --color-primary: #00247D;
  --color-secondary: #C8102E;
  --color-accent: #C5A55A;
  --color-text: #2B2B2B;
  --color-text-secondary: #5E5A54;
  --color-text-heading: #00247D;
  --color-border: #D9D0C1;
  --color-shadow: rgba(0, 36, 125, 0.08);
  --font-heading: 'Noto Serif SC', 'Times New Roman', serif;
  --font-body: 'Noto Sans SC', 'Helvetica Neue', sans-serif;
  --font-mono: 'Courier New', monospace;
  --font-size-h1: 2.75rem;
  --font-size-h2: 1.75rem;
  --font-size-h3: 1.25rem;
  --font-size-body: 1rem;
  --font-size-small: 0.85rem;
  --line-height: 1.75;
  --space-xs: 0.25rem;
  --space-sm: 0.5rem;
  --space-md: 1rem;
  --space-lg: 1.5rem;
  --space-xl: 2.5rem;
  --space-xxl: 4rem;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.3s ease;
}
</style>
{% endblock %}

{% block style_css %}
<style>
/* ========== 限制主容器宽度，避免桌面端铺满全屏 ========== */
main, .container, .max-w-2xl {
  max-width: 720px;
  margin: 0 auto;
}

/* ========== 全局纹理与装饰基础 ========== */
.hero,
.day-card,
.budget-section,
.xhs-section,
.tips-section,
.emergency-section,
.packing-section {
  position: relative;
  background-color: var(--color-surface);
  background-image: 
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,36,125,0.015) 2px, rgba(0,36,125,0.015) 4px),
    radial-gradient(ellipse at 20% 80%, rgba(200,16,46,0.03) 0%, transparent 50%);
  border: 1px solid var(--color-border);
  box-shadow: 0 4px 12px var(--color-shadow);
  margin-bottom: var(--space-lg);
  border-radius: var(--radius-md);
}

/* 模块左上角红色菱形标志 */
.day-card::before,
.budget-section::before,
.xhs-section::before,
.tips-section::before,
.emergency-section::before,
.packing-section::before {
  content: '';
  position: absolute;
  top: 12px;
  left: -6px;
  width: 12px;
  height: 12px;
  background: var(--color-secondary);
  transform: rotate(45deg);
  z-index: 2;
  box-shadow: 0 0 0 2px var(--color-surface);
}

/* 模块底部蓝色装饰线 */
.day-card::after,
.budget-section::after,
.xhs-section::after,
.tips-section::after,
.emergency-section::after,
.packing-section::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 16px;
  right: 16px;
  height: 2px;
  background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-primary) 40%, transparent 40%, transparent 60%, var(--color-secondary) 60%, var(--color-secondary) 100%);
  opacity: 0.6;
}

/* ========== HERO ========== */
.hero {
  background: var(--color-bg);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(0,36,125,0.08) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(200,16,46,0.06) 0%, transparent 40%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 8px);
  padding: var(--space-xxl) var(--space-lg);
  text-align: center;
  border-bottom: 4px solid var(--color-primary);
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h1);
  color: var(--color-text-heading);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  line-height: 1.2;
  margin-bottom: var(--space-xs);
  position: relative;
  display: inline-block;
}

.hero h1::after {
  content: '';
  display: block;
  width: 60%;
  height: 3px;
  background: var(--color-secondary);
  margin: var(--space-sm) auto 0;
  box-shadow: 0 6px 0 var(--color-primary);
}

.hero .subtitle {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--color-text-secondary);
  font-size: var(--font-size-small);
  letter-spacing: 0.08em;
  margin-bottom: var(--space-lg);
  position: relative;
  display: inline-block;
}

.hero .subtitle::before,
.hero .subtitle::after {
  content: '~';
  margin: 0 8px;
  color: var(--color-accent);
  font-style: normal;
}

.hero .weather-overview,
.hero .budget-overview {
  display: inline-block;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  padding: var(--space-xs) var(--space-md);
  border-radius: 20px;
  border: 1px solid var(--color-primary);
  font-size: var(--font-size-small);
  color: var(--color-primary);
  margin: var(--space-xs);
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* ========== 装饰元素（header_decor） ========== */
.hero-decor-stripes {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.hero-decor-stripe {
  position: absolute;
  height: 100%;
  width: 30px;
  opacity: 0.1;
}

.hero-decor-stripe-red {
  left: 10%;
  background: var(--color-secondary);
  transform: skewX(-15deg);
}

.hero-decor-stripe-blue {
  right: 15%;
  background: var(--color-primary);
  transform: skewX(15deg);
}

.hero-decor-record {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 3rem;
  color: var(--color-primary);
  opacity: 0.25;
  animation: spin-slow 20s linear infinite;
  z-index: 1;
}

@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ========== DAY CARD ========== */
.day-card {
  padding: var(--space-lg);
  margin: var(--space-md) 0;
}

.day-card h2 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h2);
  color: var(--color-primary);
  margin-bottom: var(--space-xs);
  position: relative;
  display: inline-block;
  border-bottom: 2px solid var(--color-secondary);
  padding-bottom: 4px;
}

.day-card .day-theme {
  font-family: var(--font-body);
  font-weight: 600;
  color: var(--color-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: var(--font-size-small);
  margin-bottom: var(--space-md);
  background: rgba(200,16,46,0.05);
  padding: 2px 12px;
  border-radius: 20px;
  display: inline-block;
}

.activity-item {
  border-left: 3px solid var(--color-primary);
  padding-left: var(--space-md);
  margin: var(--space-md) 0;
  position: relative;
  transition: border-color var(--transition-fast);
}

.activity-item:hover {
  border-left-color: var(--color-secondary);
}

.activity-item h3 {
  font-family: var(--font-heading);
  font-size: var(--font-size-h3);
  color: var(--color-text-heading);
  margin-bottom: var(--space-xs);
}

.activity-order {
  font-family: var(--font-mono);
  background: var(--color-primary);
  color: #fff;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  margin-right: var(--space-sm);
  position: absolute;
  left: -15px;
  top: 0;
  box-shadow: 0 2px 6px rgba(0,36,125,0.3);
}

.activity-time,
.activity-desc,
.activity-location,
.transport-info,
.meal-info {
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
  margin: 4px 0;
}

.activity-location a {
  color: var(--color-primary);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.day-map {
  margin-top: var(--space-md);
  border-radius: var(--radius-md);
  border: 2px solid var(--color-border);
  overflow: hidden;
  height: 200px;
  background: #eae5d9;
}

.hotel-info {
  font-size: var(--font-size-small);
  background: rgba(0,36,125,0.03);
  padding: var(--space-sm) var(--space-md);
  border-left: 3px solid var(--color-accent);
  margin-top: var(--space-md);
  font-style: italic;
}

/* ========== BUDGET SECTION ========== */
.budget-section {
  padding: var(--space-lg);
}

.budget-section h2,
.xhs-section h2,
.tips-section h2,
.emergency-section h2,
.packing-section h2 {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  color: var(--color-primary);
  margin-bottom: var(--space-md);
  position: relative;
  display: inline-block;
}

.budget-section h2::after,
.xhs-section h2::after,
.tips-section h2::after,
.emergency-section h2::after,
.packing-section h2::after {
  content: '';
  display: block;
  width: 30px;
  height: 3px;
  background: var(--color-secondary);
  margin-top: 4px;
}

.budget-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-md);
}

.budget-item {
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px dashed var(--color-border);
  display: flex;
  justify-content: flex-start;
  align-items: center;
  font-size: var(--font-size-small);
}

.budget-item i {
  margin-right: var(--space-xs);
  color: var(--color-text-secondary);
}

.budget-item .budget-amount {
  margin-left: auto;
}

.budget-total {
  grid-column: 1 / -1;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--color-secondary);
  border-top: 2px solid var(--color-primary);
  padding-top: var(--space-sm);
  text-align: right;
}

/* ========== XHS SECTION ========== */
.xhs-section {
  padding: var(--space-lg);
}

.xhs-note {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: var(--space-md);
  margin-bottom: var(--space-md);
  border-radius: var(--radius-sm);
  box-shadow: 2px 2px 0 var(--color-shadow);
  position: relative;
}

.xhs-note::before {
  content: '\f004';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  color: var(--color-secondary);
  position: absolute;
  top: -10px;
  right: 15px;
  font-size: 1.2rem;
  background: var(--color-surface);
  padding: 0 4px;
}

.xhs-note p {
  margin: 4px 0;
  font-size: var(--font-size-small);
  color: var(--color-text-secondary);
}

/* ========== TIPS SECTION ========== */
.tips-section {
  padding: var(--space-lg);
}

.tips-section ul {
  list-style: none;
  padding-left: 0;
}

.tips-section li {
  position: relative;
  padding-left: 28px;
  margin-bottom: var(--space-sm);
  font-size: var(--font-size-small);
  color: var(--color-text);
}

.tips-section li::before {
  content: '◆';
  position: absolute;
  left: 0;
  top: 0;
  color: var(--color-primary);
  font-size: 0.7rem;
  line-height: 1.6;
}

.tips-section li:nth-child(odd)::before {
  color: var(--color-secondary);
}

/* ========== EMERGENCY SECTION ========== */
.emergency-section {
  padding: var(--space-lg);
  border-left: 4px solid var(--color-secondary);
}

.emergency-section p {
  font-size: var(--font-size-small);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.emergency-section p i {
  color: var(--color-secondary);
  width: 20px;
  text-align: center;
}

/* ========== PACKING SECTION ========== */
.packing-section {
  padding: var(--space-lg);
}

.packing-section ul {
  columns: 2;
  list-style: none;
  padding-left: 0;
  font-size: var(--font-size-small);
}

.packing-section li {
  padding-left: 20px;
  position: relative;
  margin-bottom: var(--space-xs);
  break-inside: avoid;
}

.packing-section li::before {
  content: '\f00c';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  left: 0;
  color: var(--color-primary);
  font-size: 0.7rem;
}

/* ========== FOOTER 装饰 ========== */
.footer-decor-notes {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 1.5rem;
  color: var(--color-primary);
  opacity: 0.4;
  padding: var(--space-md) 0;
}

/* ========== 数据可信度徽章 ========== */
.verification-badge.community-match {
  background: var(--color-primary);
  color: #fff;
  padding: 2px 12px;
  border-radius: 20px;
  font-size: var(--font-size-small);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.verification-badge.community-only {
  color: var(--color-accent);
  font-style: italic;
}

/* ========== 响应式微调 ========== */
@media (max-width: 640px) {
  .budget-grid {
    grid-template-columns: 1fr;
  }
  .packing-section ul {
    columns: 1;
  }
}
</style>
{% endblock %}

{% block header_decor %}
<div class="hero-decor-stripes">
  <div class="hero-decor-stripe hero-decor-stripe-red"></div>
  <div class="hero-decor-stripe hero-decor-stripe-blue"></div>
</div>
<div class="hero-decor-record">
  <i class="fas fa-compact-disc"></i>
</div>
{% endblock %}

{% block footer_decor %}
<div class="footer-decor-notes">
  <i class="fas fa-music"></i>
  <i class="fas fa-guitar"></i>
  <i class="fas fa-drum"></i>
  <i class="fas fa-headphones"></i>
</div>
{% endblock %}
