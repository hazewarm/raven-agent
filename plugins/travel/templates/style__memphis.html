{% extends "base.html" %}

{% block style_vars %}
<style>
:root {
    /* 孟菲斯风格色彩体系 */
    --color-bg: #F9F5F0;
    --color-surface: #FFFFFF;
    --color-primary: #FF3366;
    --color-secondary: #00D4B8;
    --color-accent: #FFD23F;
    --color-text: #2A2A2C;
    --color-text-secondary: #6B5E6B;
    --color-text-heading: #1A1A1E;
    --color-border: #E8E0D8;
    --color-shadow: rgba(255, 51, 102, 0.20);
    /* 孟菲斯几何无衬线 + 优雅衬线混搭 */
    --font-heading: 'Noto Sans SC', 'Helvetica Neue', sans-serif;
    --font-body: 'Noto Serif SC', 'Georgia', serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    /* 活泼的字体大小 */
    --font-size-h1: clamp(2.2rem, 5vw, 3.2rem);
    --font-size-h2: clamp(1.35rem, 3vw, 1.75rem);
    --font-size-h3: 1.1rem;
    --font-size-body: 0.95rem;
    --font-size-small: 0.78rem;
    --line-height: 1.7;
    /* 孟菲斯风格间距——更大胆的留白 */
    --space-xs: 0.35rem;
    --space-sm: 0.7rem;
    --space-md: 1.2rem;
    --space-lg: 2rem;
    --space-xl: 2.8rem;
    --space-xxl: 4rem;
    /* 圆角——孟菲斯偏好略大的圆角或干脆直角 */
    --radius-sm: 4px;
    --radius-md: 10px;
    --radius-lg: 20px;
    /* 活泼的过渡 */
    --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
</style>
{% endblock %}

{% block style_css %}
<style>
/* ============================================
   孟菲斯风格 — 全局装饰基调
   彩色圆点纹理、几何条纹、锯齿形韵律
   ============================================ */

/* 限制主容器宽度，避免桌面端铺满全屏 */
main, .container, .max-w-2xl {
    max-width: 720px;
    margin: 0 auto;
}

/* 页面背景 — 孟菲斯圆点网格纹理 */
body {
    background-color: var(--color-bg);
    background-image:
        radial-gradient(circle, rgba(255, 51, 102, 0.12) 1px, transparent 1px),
        radial-gradient(circle, rgba(0, 212, 184, 0.10) 1px, transparent 1px),
        radial-gradient(circle, rgba(255, 210, 63, 0.14) 1px, transparent 1px);
    background-size:
        32px 32px,
        48px 48px,
        40px 40px;
    background-position:
        0 0,
        16px 8px,
        8px 20px;
}

/* ============================================
   HERO — 封面区
   几何色块碰撞、锯齿底边、3D标题阴影
   ============================================ */
.hero {
    position: relative;
    background: var(--color-surface);
    overflow: visible;
    border-bottom: none;
    /* 孟菲斯标志性多层边框 */
    border: 5px solid var(--color-primary);
    outline: 3px solid var(--color-accent);
    outline-offset: 4px;
    box-shadow:
        10px 10px 0 rgba(255, 51, 102, 0.18),
        18px 18px 0 rgba(0, 212, 184, 0.10);
    margin-bottom: var(--space-xxl);
}

/* 锯齿形底部 — 孟菲斯标志元素 */
.hero::after {
    content: '';
    position: absolute;
    bottom: -28px;
    left: 0;
    width: 100%;
    height: 32px;
    background: var(--color-accent);
    clip-path: polygon(
        0% 0%, 6% 100%, 12% 0%, 18% 100%, 24% 0%,
        30% 100%, 36% 0%, 42% 100%, 48% 0%,
        54% 100%, 60% 0%, 66% 100%, 72% 0%,
        78% 100%, 84% 0%, 90% 100%, 96% 0%, 100% 100%
    );
    z-index: 1;
}

/* 封面标题 — 3D多层阴影 */
.hero h1 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h1);
    font-weight: 900;
    letter-spacing: 0.04em;
    color: var(--color-text-heading);
    text-shadow:
        3px 3px 0 var(--color-primary),
        6px 6px 0 var(--color-accent),
        9px 9px 0 rgba(0, 212, 184, 0.35);
    position: relative;
    z-index: 2;
}

/* 副标题 — 几何下划线装饰 */
.subtitle {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    position: relative;
    display: inline-block;
    padding-bottom: var(--space-xs);
    z-index: 2;
}
.subtitle::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 3px;
    background: repeating-linear-gradient(
        90deg,
        var(--color-primary) 0px,
        var(--color-primary) 8px,
        var(--color-accent) 8px,
        var(--color-accent) 14px,
        var(--color-secondary) 14px,
        var(--color-secondary) 20px
    );
}

/* 天气 & 预算概览 — 几何色块卡片 */
.weather-overview,
.budget-overview {
    background: var(--color-surface);
    border: 2px dashed var(--color-secondary);
    padding: var(--space-sm) var(--space-md);
    position: relative;
    z-index: 2;
}
.weather-overview::before {
    content: '◆';
    position: absolute;
    top: -10px;
    left: 14px;
    font-size: 1rem;
    color: var(--color-primary);
    z-index: 3;
}
.budget-overview::before {
    content: '●';
    position: absolute;
    top: -8px;
    right: 16px;
    font-size: 0.9rem;
    color: var(--color-accent);
    z-index: 3;
}

/* ============================================
   DAY-CARD — 每日行程卡片
   几何边框、彩色条纹、角标装饰
   ============================================ */
.day-card {
    position: relative;
    background: var(--color-surface);
    border: 3px solid var(--color-border);
    padding: var(--space-lg);
    /* 孟菲斯偏移阴影 */
    box-shadow:
        6px 6px 0 var(--color-secondary),
        12px 12px 0 rgba(255, 51, 102, 0.13);
    margin-bottom: var(--space-xl);
    transition: box-shadow var(--transition-normal), transform var(--transition-normal);
    overflow: visible;
}
.day-card:hover {
    box-shadow:
        8px 8px 0 var(--color-secondary),
        16px 16px 0 rgba(255, 51, 102, 0.18);
    transform: translate(-2px, -2px);
}

/* 左侧彩色条纹 */
.day-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 100%;
    background: repeating-linear-gradient(
        180deg,
        var(--color-primary) 0px,
        var(--color-primary) 10px,
        var(--color-accent) 10px,
        var(--color-accent) 16px,
        var(--color-secondary) 16px,
        var(--color-secondary) 22px
    );
    z-index: 1;
}

/* 右上角几何角标 */
.day-card::after {
    content: '';
    position: absolute;
    top: -14px;
    right: 20px;
    width: 28px;
    height: 28px;
    background: var(--color-accent);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    z-index: 2;
}

/* Day标题 — 几何前缀 */
.day-card h2 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h2);
    font-weight: 800;
    letter-spacing: 0.03em;
    color: var(--color-text-heading);
    position: relative;
    padding-left: var(--space-lg);
}
.day-card h2::before {
    content: '▲';
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-primary);
    font-size: 0.7em;
}

/* 日期主题 */
.day-theme {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    letter-spacing: 0.08em;
    color: var(--color-secondary);
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 2px dotted var(--color-accent);
    padding-bottom: var(--space-xs);
    display: inline-block;
}

/* 天气徽章 — 几何色块 */
.weather-badge {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    background: var(--color-accent);
    color: var(--color-text-heading);
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    font-weight: 700;
    padding: 3px 12px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

/* ============================================
   ACTIVITY-ITEM — 活动条目
   几何序号、交错色彩
   ============================================ */
.activity-item {
    position: relative;
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
    background: var(--color-surface);
    border-left: 3px solid transparent;
    transition: border-color var(--transition-fast);
}
.activity-item:nth-child(odd) {
    border-left-color: var(--color-primary);
}
.activity-item:nth-child(even) {
    border-left-color: var(--color-secondary);
}
.activity-item:hover {
    background: rgba(255, 210, 63, 0.06);
}

/* 活动序号 — 几何圆形 */
.activity-order {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: var(--color-primary);
    color: #fff;
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 0.8rem;
    clip-path: circle(50%);
    margin-right: var(--space-sm);
    flex-shrink: 0;
}

/* 活动时间 */
.activity-time {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-text-secondary);
    letter-spacing: 0.05em;
}

/* 活动标题 */
.activity-item h3 {
    font-family: var(--font-heading);
    font-size: var(--font-size-h3);
    font-weight: 700;
    color: var(--color-text-heading);
    letter-spacing: 0.02em;
}

/* 活动描述 */
.activity-desc {
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    color: var(--color-text);
    line-height: var(--line-height);
}

/* 地点链接 */
.activity-location a {
    font-family: var(--font-mono);
    font-size: var(--font-size-small);
    color: var(--color-secondary);
    text-decoration: none;
    border-bottom: 2px dotted var(--color-secondary);
    transition: color var(--transition-fast), border-color var(--transition-fast);
}
.activity-location a:hover {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);
}

/* 交通信息 */
.transport-info {
    font-family: var(--font-body);
    font-size: var(--font-size-small);
    color: var(--color-text-secondary);
    background: rgba(0, 212, 184, 0.06);
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-sm);
    display: inline-block;
}

/* 餐饮信息 */
.meal-info {
    font-family: var(--font-body);
    font-size: var(--font-size-small);
    color: var(--color-text);
    background: rgba(255, 210, 63, 0.12);
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-sm);
    display: inline-block;
}

/* ============================================
   DAY-MAP — 高德地图容器
   几何边框，不禁用canvas属性
   ============================================ */
.day-map {
    border: 3px solid var(--color-primary);
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: 5px 5px 0 rgba(255, 51, 102, 0.15);
}

/* 酒店信息 */
.hotel-info {
    font-family: var(--font-body);
    font-size: var(--font-size-small);
    color: var(--color-text);
    background: var(--color-surface);
    border: 2px dashed var(--color-secondary);
    padding: var(--space-sm) var(--space-md);
    position: relative;
}
.hotel-info::before {
    content: '🏨';
    position: absolute;
    top: -14px;
    left: 16px;
    font-size: 1.2rem;
    background: var(--color-surface);
    padding: 0 6px;
}

/* ============================================
   BUDGET-SECTION — 预算明细
   条纹背景、几何分隔、总数高亮
   ============================================ */
.budget-section {
    position: relative;
    background: var(--color-surface);
    border: 3px solid var(--color-border);
    /* 孟菲斯偏移阴影 */
    box-shadow: 6px 6px 0 var(--color-accent);
    margin-bottom: var(--space-xl);
    overflow: visible;
}

/* 预算网格标题条纹 */
.budget-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: repeating-linear-gradient(
        90deg,
        var(--color-primary) 0px,
        var(--color-primary) 12px,
        var(--color-secondary) 12px,
        var(--color-secondary) 20px,
        var(--color-accent) 20px,
        var(--color-accent) 30px
    );
    z-index: 1;
}

/* 预算项 */
.budget-item {
    position: relative;
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px dotted var(--color-border);
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    color: var(--color-text);
    transition: background var(--transition-fast);
}
.budget-item:hover {
    background: rgba(255, 210, 63, 0.06);
}
.budget-item::before {
    content: '■';
    color: var(--color-primary);
    font-size: 0.55em;
    margin-right: var(--space-sm);
    vertical-align: middle;
}

/* 预算总计 — 几何高亮 */
.budget-total {
    background: var(--color-primary);
    color: #ffffff;
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    padding: var(--space-md) var(--space-lg);
    text-align: center;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    margin-top: var(--space-sm);
    text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15);
}

/* ============================================
   XHS-SECTION — 小红书攻略
   圆点背景、几何框架、笔记卡片
   ============================================ */
.xhs-section {
    position: relative;
    background: var(--color-surface);
    border: 3px solid var(--color-secondary);
    box-shadow: 6px 6px 0 rgba(255, 51, 102, 0.15);
    margin-bottom: var(--space-xl);
    overflow: visible;
}

/* 顶部几何装饰条 */
.xhs-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20px;
    right: 20px;
    height: 4px;
    background: repeating-linear-gradient(
        90deg,
        var(--color-accent) 0px,
        var(--color-accent) 6px,
        transparent 6px,
        transparent 10px
    );
    z-index: 1;
}

/* 笔记卡片 */
.xhs-note {
    position: relative;
    background: var(--color-surface);
    border: 2px solid var(--color-border);
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    transition: box-shadow var(--transition-normal), transform var(--transition-normal);
}
.xhs-note:hover {
    box-shadow: 4px 4px 0 var(--color-accent);
    transform: translate(-2px, -2px);
}
.xhs-note::after {
    content: '♥';
    position: absolute;
    top: -10px;
    right: 14px;
    color: var(--color-primary);
    font-size: 1rem;
    background: var(--color-surface);
    padding: 0 4px;
}

/* ============================================
   TIPS-SECTION — 旅行贴士
   锯齿形列表标记
   ============================================ */
.tips-section {
    position: relative;
    background: var(--color-surface);
    border: 3px solid var(--color-accent);
    box-shadow: 6px 6px 0 var(--color-secondary);
    margin-bottom: var(--space-xl);
    padding: var(--space-lg);
}

/* 列表标记 — 几何三角 */
.tips-section ul {
    list-style: none;
    padding-left: 0;
}
.tips-section ul li {
    position: relative;
    padding-left: var(--space-lg);
    margin-bottom: var(--space-sm);
    font-family: var(--font-body);
    font-size: var(--font-size-body);
    color: var(--color-text);
    line-height: var(--line-height);
}
.tips-section ul li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 7px;
    width: 0;
    height: 0;
    border-left: 8px solid var(--color-primary);
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
}

/* 偶数项用不同颜色 */
.tips-section ul li:nth-child(even)::before {
    border-left-color: var(--color-secondary);
}

/* ============================================
   EMERGENCY-SECTION — 紧急信息
   锯齿边框、醒目几何警示
   ============================================ */
.emergency-section {
    position: relative;
    background: var(--color-surface);
    border: 4px solid var(--color-primary);
    outline: 2px dashed var(--color-accent);
    outline-offset: 3px;
    padding: var(--space-lg);
    margin-bottom: var(--space-xl);
}
.emergency-section::before {
    content: '⚠';
    position: absolute;
    top: -18px;
    left: 24px;
    font-size: 1.6rem;
    background: var(--color-surface);
    padding: 0 8px;
    color: var(--color-primary);
    z-index: 2;
}

/* ============================================
   PACKING-SECTION — 行李清单
   几何复选框风格
   ============================================ */
.packing-section {
    position: relative;
    background: var(--color-surface);
    border: 3px solid var(--color-border);
    box-shadow: 6px 6px 0 rgba(0, 212, 184, 0.18);
    padding: var(--space-lg);
    margin-bottom: var(--space-xl);
}
.packing-section::before {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 60px;
    height: 60px;
    background: var(--color-accent);
    clip-path: polygon(100% 0%, 0% 100%, 100% 100%);
    opacity: 0.6;
}

/* ============================================
   VERIFICATION-BADGE — 数据可信度徽章
   几何形状、孟菲斯配色
   ============================================ */
.verification-badge.community-match {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    background: var(--color-secondary);
    color: #ffffff;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: var(--font-size-small);
    letter-spacing: 0.04em;
    padding: 5px 14px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.verification-badge.community-only {
    display: inline-block;
    background: var(--color-accent);
    color: var(--color-text-heading);
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: var(--font-size-small);
    letter-spacing: 0.06em;
    padding: 3px 12px;
    border: 2px solid var(--color-primary);
}

/* ============================================
   FOOTER — 页脚
   彩色条纹带、几何装饰
   ============================================ */
footer {
    position: relative;
    background: var(--color-surface);
    border-top: 6px solid transparent;
    border-image: repeating-linear-gradient(
        90deg,
        var(--color-primary) 0px,
        var(--color-primary) 14px,
        var(--color-accent) 14px,
        var(--color-accent) 22px,
        var(--color-secondary) 22px,
        var(--color-secondary) 34px
    ) 6;
    padding-top: var(--space-lg);
    overflow: visible;
}

/* ============================================
   装饰元素类 — 供 header_decor / footer_decor 使用
   ============================================ */

/* 浮动圆形 */
.memphis-circle {
    position: absolute;
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
}
.memphis-circle--pink {
    background: rgba(255, 51, 102, 0.22);
}
.memphis-circle--teal {
    background: rgba(0, 212, 184, 0.18);
}
.memphis-circle--yellow {
    background: rgba(255, 210, 63, 0.25);
}

/* 锯齿形条纹带 */
.memphis-zigzag-strip {
    position: absolute;
    height: 18px;
    z-index: 0;
    pointer-events: none;
    background: var(--color-accent);
    clip-path: polygon(
        0% 0%, 4% 100%, 8% 0%, 12% 100%, 16% 0%,
        20% 100%, 24% 0%, 28% 100%, 32% 0%,
        36% 100%, 40% 0%, 44% 100%, 48% 0%,
        52% 100%, 56% 0%, 60% 100%, 64% 0%,
        68% 100%, 72% 0%, 76% 100%, 80% 0%,
        84% 100%, 88% 0%, 92% 100%, 96% 0%, 100% 100%
    );
}

/* 几何菱形 */
.memphis-diamond {
    position: absolute;
    z-index: 0;
    pointer-events: none;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
.memphis-diamond--primary {
    background: var(--color-primary);
    opacity: 0.3;
}
.memphis-diamond--secondary {
    background: var(--color-secondary);
    opacity: 0.25;
}

/* 旋转几何方块 */
.memphis-square {
    position: absolute;
    z-index: 0;
    pointer-events: none;
    border: 3px solid;
}
.memphis-square--pink {
    border-color: rgba(255, 51, 102, 0.4);
}
.memphis-square--teal {
    border-color: rgba(0, 212, 184, 0.35);
}

/* 波浪虚线 */
.memphis-wavy-line {
    position: absolute;
    height: 3px;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
        90deg,
        var(--color-primary) 0px,
        var(--color-primary) 10px,
        transparent 10px,
        transparent 16px
    );
}

/* 圆点阵列 */
.memphis-dot-row {
    position: absolute;
    z-index: 0;
    pointer-events: none;
    display: flex;
    gap: 10px;
}
.memphis-dot-row span {
    display: block;
    border-radius: 50%;
}
</style>
