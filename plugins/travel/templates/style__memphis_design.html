{% extends "base.html" %}

{% block style_vars %}
<style>
    :root {
        /* 孟菲斯风格色彩体系 —— 故意不协调的鲜艳组合 */
        --color-bg: #FBF7F0;
        --color-surface: #FFFAF5;
        --color-primary: #FF5E8C;
        --color-secondary: #305FE8;
        --color-accent: #FFE600;
        --color-text: #1A1A2E;
        --color-text-secondary: #5C5C6E;
        --color-text-heading: #1A1A2E;
        --color-border: #1A1A2E;
        --color-shadow: rgba(26, 26, 46, 0.18);

        /* 孟菲斯扩展色 —— 用于装饰的冲突色 */
        --color-memphis-teal: #00C9A7;
        --color-memphis-orange: #FF5C35;
        --color-memphis-purple: #8B5CF6;
        --color-memphis-coral: #FF7B6B;
        --color-memphis-mint: #7BE8D4;
        --color-memphis-sun: #FFD600;

        /* 字体 —— 几何感无衬线为主，衬线为辅 */
        --font-heading: 'Noto Sans SC', 'Helvetica Neue', 'Arial Black', sans-serif;
        --font-body: 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
        --font-mono: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;

        /* 字号 */
        --font-size-h1: 2.6rem;
        --font-size-h2: 1.55rem;
        --font-size-h3: 1.15rem;
        --font-size-body: 0.95rem;
        --font-size-small: 0.78rem;
        --line-height: 1.7;

        /* 间距 */
        --space-xs: 6px;
        --space-sm: 12px;
        --space-md: 20px;
        --space-lg: 32px;
        --space-xl: 48px;
        --space-xxl: 64px;

        /* 半径 —— 孟菲斯偏好锐利几何形，混合使用 */
        --radius-sm: 3px;
        --radius-md: 6px;
        --radius-lg: 0px;

        /* 过渡 */
        --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style>
{% endblock %}

{% block style_css %}
<style>
    /* ========== 容器约束 ========== */
    main,
    .container,
    .max-w-2xl {
        max-width: 720px;
        margin: 0 auto;
    }

    /* ========== 全页面孟菲斯圆点纹理背景 ========== */
    body {
        background-color: #FBF7F0;
        background-image:
            radial-gradient(circle, rgba(26, 26, 46, 0.08) 1.2px, transparent 1.2px),
            radial-gradient(circle, rgba(255, 94, 140, 0.06) 0.8px, transparent 0.8px);
        background-size: 22px 22px, 33px 33px;
        background-position: 0 0, 11px 16px;
    }

    /* ========== Hero 区域 —— 孟菲斯封面 ========== */
    .hero {
        position: relative;
        background: var(--color-surface);
        border: 3px solid var(--color-border);
        padding: var(--space-xl) var(--space-lg) var(--space-lg);
        margin-bottom: var(--space-lg);
        overflow: hidden;
        box-shadow:
            10px 10px 0 var(--color-primary),
            -8px -6px 0 var(--color-memphis-teal),
            0 0 0 1px var(--color-border);
        clip-path: polygon(
            0 0,
            100% 0,
            100% calc(100% - 14px),
            calc(100% - 20px) 100%,
            0 100%,
            0 0
        );
    }

    .hero h1 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h1);
        font-weight: 900;
        color: var(--color-text-heading);
        letter-spacing: 0.04em;
        text-shadow:
            4px 4px 0 var(--color-accent),
            8px 8px 0 rgba(255, 94, 140, 0.35);
        position: relative;
        z-index: 2;
        line-height: 1.15;
        text-transform: uppercase;
    }

    .hero .subtitle {
        font-family: var(--font-heading);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: var(--color-secondary);
        text-transform: uppercase;
        position: relative;
        z-index: 2;
        display: inline-block;
        padding: 4px 14px;
        background: var(--color-accent);
        border: 2px solid var(--color-border);
        margin-top: var(--space-sm);
        box-shadow: 4px 4px 0 var(--color-memphis-orange);
    }

    .hero .weather-overview {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: var(--space-sm);
        padding: 8px 16px;
        background: var(--color-memphis-mint);
        border: 2.5px solid var(--color-border);
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        color: var(--color-text);
        box-shadow: 5px 5px 0 var(--color-secondary);
        margin-top: var(--space-sm);
    }

    .hero .budget-overview {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        padding: 8px 16px;
        background: var(--color-memphis-purple);
        border: 2.5px solid var(--color-border);
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        color: #fff;
        box-shadow: 5px 5px 0 var(--color-accent);
        margin-top: var(--space-sm);
    }

    /* Hero 内浮动的孟菲斯几何装饰 */
    .hero .memphis-hero-shape {
        position: absolute;
        z-index: 1;
        pointer-events: none;
    }

    .hero .memphis-hero-circle {
        border-radius: 50%;
        border: 3px solid var(--color-border);
    }

    .hero .memphis-hero-zigzag {
        width: 60px;
        height: 12px;
        background: repeating-linear-gradient(90deg,
                var(--color-primary) 0px,
                var(--color-primary) 8px,
                transparent 8px,
                transparent 12px);
        border: 2px solid var(--color-border);
    }

    .hero .memphis-hero-dots-row {
        width: 50px;
        height: 8px;
        background-image: radial-gradient(circle, var(--color-secondary) 2.5px, transparent 2.5px);
        background-size: 10px 10px;
        background-repeat: repeat-x;
    }

    .hero .memphis-hero-squiggle {
        width: 40px;
        height: 16px;
        background: transparent;
        border: 3px solid var(--color-memphis-orange);
        border-radius: 50%;
        border-top-color: transparent;
        border-right-color: transparent;
        transform: rotate(-30deg);
    }

    /* ========== Day Card —— 每日行程卡片 ========== */
    .day-card {
        position: relative;
        background: var(--color-surface);
        border: 3px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        margin-bottom: var(--space-lg);
        box-shadow:
            8px 8px 0 var(--color-memphis-teal),
            0 0 0 1px var(--color-border);
        clip-path: polygon(
            12px 0,
            100% 0,
            100% calc(100% - 8px),
            calc(100% - 16px) 100%,
            0 100%,
            0 12px
        );
        transition: box-shadow var(--transition-normal);
    }

    .day-card:hover {
        box-shadow:
            10px 10px 0 var(--color-memphis-teal),
            -4px -4px 0 var(--color-accent),
            0 0 0 1px var(--color-border);
    }

    .day-card h2 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h2);
        font-weight: 900;
        color: var(--color-text-heading);
        letter-spacing: 0.05em;
        display: inline-block;
        padding: 6px 18px;
        background: var(--color-accent);
        border: 2.5px solid var(--color-border);
        box-shadow: 4px 4px 0 var(--color-primary);
        margin-bottom: var(--space-sm);
        text-transform: uppercase;
    }

    .day-card .day-theme {
        font-family: var(--font-heading);
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--color-secondary);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: inline-block;
        padding: 3px 12px;
        border-left: 5px solid var(--color-memphis-orange);
        background: rgba(48, 95, 232, 0.06);
        margin-bottom: var(--space-md);
    }

    .day-card .weather-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        background: var(--color-memphis-mint);
        border: 2px solid var(--color-border);
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--color-text);
        box-shadow: 3px 3px 0 var(--color-memphis-teal);
    }

    /* 日期标记 */
    .day-card::before {
        content: '';
        position: absolute;
        top: -8px;
        right: 24px;
        width: 52px;
        height: 18px;
        background: var(--color-memphis-orange);
        border: 2px solid var(--color-border);
        z-index: 3;
        box-shadow: 2px 2px 0 var(--color-primary);
    }

    .day-card::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 30px;
        width: 70px;
        height: 10px;
        background: repeating-linear-gradient(90deg,
                var(--color-memphis-purple) 0px,
                var(--color-memphis-purple) 7px,
                transparent 7px,
                transparent 14px);
        border: 2px solid var(--color-border);
        z-index: 3;
    }

    /* ========== Activity Item —— 活动条目 ========== */
    .activity-item {
        position: relative;
        padding: var(--space-md) var(--space-md) var(--space-md) 48px;
        margin-bottom: var(--space-md);
        background: rgba(255, 250, 245, 0.7);
        border: 2px dashed var(--color-border);
        border-left: 6px solid var(--color-primary);
        box-shadow: 4px 4px 0 rgba(26, 26, 46, 0.06);
        transition: all var(--transition-fast);
    }

    .activity-item:hover {
        border-left-color: var(--color-memphis-orange);
        box-shadow: 6px 6px 0 rgba(26, 26, 46, 0.1);
        transform: translateX(3px);
    }

    .activity-item .activity-order {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        background: var(--color-accent);
        border: 2.5px solid var(--color-border);
        border-radius: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-heading);
        font-weight: 900;
        font-size: 0.8rem;
        color: var(--color-text);
        box-shadow: 2px 2px 0 var(--color-primary);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .activity-item h3 {
        font-family: var(--font-heading);
        font-size: var(--font-size-h3);
        font-weight: 800;
        color: var(--color-text-heading);
        letter-spacing: 0.03em;
        margin-bottom: 4px;
    }

    .activity-item .activity-time {
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        font-weight: 700;
        color: var(--color-secondary);
        letter-spacing: 0.05em;
        display: inline-block;
        padding: 2px 10px;
        border: 1.5px solid var(--color-secondary);
        background: rgba(48, 95, 232, 0.05);
        margin-bottom: 6px;
    }

    .activity-item .activity-desc {
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        color: var(--color-text);
        line-height: var(--line-height);
    }

    .activity-item .activity-location {
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        color: var(--color-text-secondary);
        margin-top: 4px;
    }

    .activity-item .activity-location a {
        color: var(--color-primary);
        text-decoration: none;
        font-weight: 700;
        border-bottom: 2px dotted var(--color-primary);
        padding-bottom: 1px;
        transition: all var(--transition-fast);
    }

    .activity-item .activity-location a:hover {
        border-bottom-style: solid;
        background: rgba(255, 94, 140, 0.08);
    }

    .activity-item .transport-info,
    .activity-item .meal-info {
        font-family: var(--font-body);
        font-size: var(--font-size-small);
        color: var(--color-text-secondary);
        display: inline-block;
        padding: 3px 10px;
        background: rgba(0, 201, 167, 0.08);
        border-left: 3px solid var(--color-memphis-teal);
        margin-top: 6px;
        margin-right: 8px;
    }

    .activity-item .meal-info {
        background: rgba(255, 214, 0, 0.1);
        border-left-color: var(--color-accent);
    }

    /* ========== Day Map ========== */
    .day-map {
        width: 100%;
        height: 220px;
        border: 3px solid var(--color-border);
        border-radius: 0;
        overflow: hidden;
        margin-top: var(--space-md);
        box-shadow: 6px 6px 0 var(--color-memphis-purple);
        background: #f0ede8;
        position: relative;
    }

    .day-map::after {
        content: '';
        position: absolute;
        top: 8px;
        right: 8px;
        width: 22px;
        height: 22px;
        background: var(--color-accent);
        border: 2px solid var(--color-border);
        z-index: 10;
        pointer-events: none;
    }

    /* ========== Hotel Info ========== */
    .hotel-info {
        position: relative;
        padding: var(--space-md);
        margin-top: var(--space-md);
        background: rgba(139, 92, 246, 0.06);
        border: 2.5px solid var(--color-memphis-purple);
        border-left: 8px solid var(--color-memphis-purple);
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        color: var(--color-text);
        box-shadow: 5px 5px 0 rgba(139, 92, 246, 0.2);
    }

    .hotel-info::before {
        content: '◆';
        position: absolute;
        top: -14px;
        left: 20px;
        font-size: 1.4rem;
        color: var(--color-memphis-purple);
        background: var(--color-surface);
        padding: 0 6px;
        z-index: 2;
    }

    /* ========== 预算区域 ========== */
    .budget-section {
        position: relative;
        background: var(--color-surface);
        border: 3px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        margin-bottom: var(--space-lg);
        box-shadow:
            8px 8px 0 var(--color-memphis-orange),
            -4px -4px 0 var(--color-accent);
        overflow: hidden;
    }

    .budget-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 7px;
        background: repeating-linear-gradient(90deg,
                var(--color-primary) 0px,
                var(--color-primary) 10px,
                var(--color-accent) 10px,
                var(--color-accent) 20px,
                var(--color-secondary) 20px,
                var(--color-secondary) 30px,
                var(--color-memphis-teal) 30px,
                var(--color-memphis-teal) 40px);
        z-index: 2;
    }

    .budget-section::after {
        content: '';
        position: absolute;
        bottom: 16px;
        right: 20px;
        width: 50px;
        height: 50px;
        background: transparent;
        border: 3px solid var(--color-memphis-teal);
        border-radius: 50%;
        opacity: 0.5;
        pointer-events: none;
        z-index: 0;
    }

    .budget-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-sm);
        position: relative;
        z-index: 1;
    }

    .budget-item {
        padding: var(--space-sm) var(--space-md);
        background: rgba(255, 250, 245, 0.8);
        border: 2px solid var(--color-border);
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        color: var(--color-text);
        position: relative;
        box-shadow: 3px 3px 0 rgba(26, 26, 46, 0.08);
        transition: all var(--transition-fast);
    }

    .budget-item:hover {
        box-shadow: 5px 5px 0 var(--color-primary);
        transform: translate(-2px, -2px);
    }

    .budget-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 5px;
        background: var(--color-memphis-orange);
    }

    .budget-item:nth-child(2n)::before {
        background: var(--color-secondary);
    }

    .budget-item:nth-child(3n)::before {
        background: var(--color-memphis-teal);
    }

    .budget-total {
        grid-column: 1 / -1;
        padding: var(--space-md);
        background: var(--color-text);
        color: #fff;
        font-family: var(--font-heading);
        font-weight: 900;
        font-size: 1.1rem;
        letter-spacing: 0.06em;
        text-align: center;
        border: 3px solid var(--color-accent);
        box-shadow: 6px 6px 0 var(--color-memphis-coral);
        position: relative;
        z-index: 1;
        text-transform: uppercase;
    }

    .budget-total::after {
        content: ' ● ● ●';
        letter-spacing: 6px;
        color: var(--color-accent);
        font-size: 0.7rem;
        vertical-align: middle;
    }

    /* ========== 小红书攻略区 ========== */
    .xhs-section {
        position: relative;
        background: var(--color-surface);
        border: 3px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        margin-bottom: var(--space-lg);
        box-shadow: 8px 8px 0 var(--color-primary);
        overflow: hidden;
    }

    .xhs-section::before {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 90px;
        height: 90px;
        background:
            radial-gradient(circle, var(--color-accent) 4px, transparent 4px),
            radial-gradient(circle, var(--color-primary) 3px, transparent 3px),
            radial-gradient(circle, var(--color-secondary) 3.5px, transparent 3.5px);
        background-size: 22px 22px, 30px 30px, 26px 26px;
        background-position: 4px 4px, 15px 18px, 2px 28px;
        opacity: 0.7;
        pointer-events: none;
        z-index: 0;
    }

    .xhs-section::after {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 20px;
        right: 20px;
        height: 12px;
        background: repeating-linear-gradient(90deg,
                var(--color-memphis-teal) 0px,
                var(--color-memphis-teal) 14px,
                var(--color-accent) 14px,
                var(--color-accent) 22px,
                var(--color-memphis-orange) 22px,
                var(--color-memphis-orange) 36px);
        border: 2px solid var(--color-border);
        z-index: 1;
    }

    .xhs-note {
        position: relative;
        padding: var(--space-md) var(--space-md) var(--space-md) 44px;
        margin-bottom: var(--space-md);
        background: rgba(255, 250, 245, 0.6);
        border: 2px solid var(--color-border);
        border-left: 5px solid var(--color-primary);
        box-shadow: 4px 4px 0 rgba(255, 94, 140, 0.2);
        z-index: 1;
        transition: all var(--transition-fast);
    }

    .xhs-note:hover {
        border-left-color: var(--color-memphis-orange);
        box-shadow: 6px 6px 0 rgba(255, 92, 53, 0.25);
    }

    .xhs-note::before {
        content: '📌';
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%) rotate(-12deg);
        font-size: 1.3rem;
    }

    .xhs-note:nth-child(2n) {
        border-left-color: var(--color-secondary);
    }

    .xhs-note:nth-child(3n) {
        border-left-color: var(--color-memphis-teal);
    }

    /* ========== 旅行贴士区 ========== */
    .tips-section {
        position: relative;
        background: var(--color-surface);
        border: 3px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        margin-bottom: var(--space-lg);
        box-shadow: 8px 8px 0 var(--color-secondary);
        clip-path: polygon(
            0 8px,
            8px 0,
            100% 0,
            100% calc(100% - 8px),
            calc(100% - 8px) 100%,
            0 100%
        );
    }

    .tips-section ul {
        list-style: none;
        padding-left: 0;
        margin: 0;
    }

    .tips-section ul li {
        position: relative;
        padding: 10px 10px 10px 38px;
        margin-bottom: var(--space-sm);
        font-family: var(--font-body);
        font-size: var(--font-size-body);
        color: var(--color-text);
        line-height: var(--line-height);
        border-bottom: 1.5px dashed rgba(26, 26, 46, 0.15);
        transition: all var(--transition-fast);
    }

    .tips-section ul li:hover {
        background: rgba(255, 214, 0, 0.06);
    }

    .tips-section ul li::before {
        content: '';
        position: absolute;
        left: 8px;
        top: 14px;
        width: 14px;
        height: 14px;
        background: var(--color-accent);
        border: 2px solid var(--color-border);
        transform: rotate(45deg);
        box-shadow: 2px 2px 0 var(--color-primary);
    }

    .tips-section ul li:nth-child(2n)::before {
        background: var(--color-memphis-teal);
        box-shadow: 2px 2px 0 var(--color-secondary);
    }

    .tips-section ul li:nth-child(3n)::before {
        background: var(--color-memphis-coral);
        border-radius: 50%;
        transform: rotate(0);
        box-shadow: 2px 2px 0 var(--color-memphis-orange);
    }

    /* ========== 紧急信息区 ========== */
    .emergency-section {
        position: relative;
        background: var(--color-text);
        color: #fff;
        border: 3px solid var(--color-memphis-orange);
        padding: var(--space-lg) var(--space-md);
        margin-bottom: var(--space-lg);
        box-shadow: 8px 8px 0 var(--color-accent);
        overflow: hidden;
        clip-path: none;
    }

    /* 覆盖 day-card::after 条纹 —— 移到右侧 */
    .emergency-section.day-card::after {
        left: auto;
        right: 30px;
    }

    .emergency-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: repeating-linear-gradient(90deg,
                var(--color-memphis-orange) 0px,
                var(--color-memphis-orange) 8px,
                var(--color-accent) 8px,
                var(--color-accent) 16px);
        z-index: 2;
    }

    .emergency-section::after {
        content: '';
        position: absolute;
        top: 14px;
        right: 24px;
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        transform: rotate(30deg);
        pointer-events: none;
    }

    /* ========== 行李清单区 ========== */
    .packing-section {
        position: relative;
        background: var(--color-surface);
        border: 3px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        margin-bottom: var(--space-lg);
        box-shadow: 8px 8px 0 var(--color-memphis-teal);
        overflow: hidden;
    }

    .packing-section::before {
        content: '';
        position: absolute;
        top: 14px;
        right: 14px;
        width: 40px;
        height: 40px;
        background: var(--color-memphis-purple);
        opacity: 0.15;
        transform: rotate(25deg);
        pointer-events: none;
        z-index: 0;
    }

    .packing-section::after {
        content: '';
        position: absolute;
        bottom: 20px;
        left: 16px;
        width: 55px;
        height: 6px;
        background: repeating-linear-gradient(90deg,
                var(--color-primary) 0px,
                var(--color-primary) 7px,
                transparent 7px,
                transparent 11px);
        pointer-events: none;
        z-index: 0;
    }

    /* ========== 页脚 ========== */
    footer {
        position: relative;
        background: var(--color-surface);
        border-top: 5px solid var(--color-border);
        padding: var(--space-lg) var(--space-md);
        margin-top: var(--space-xl);
        overflow: hidden;
    }

    footer::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 16px;
        background: var(--color-primary);
        border: 3px solid var(--color-border);
        z-index: 3;
    }

    footer::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: repeating-linear-gradient(90deg,
                var(--color-accent) 0px,
                var(--color-accent) 10px,
                var(--color-memphis-orange) 10px,
                var(--color-memphis-orange) 20px,
                var(--color-memphis-teal) 20px,
                var(--color-memphis-teal) 30px,
                var(--color-primary) 30px,
                var(--color-primary) 40px);
    }

    /* ========== 验证徽章 ========== */
    .verification-badge.community-match,
    .verification-badge.community-only {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        font-family: var(--font-mono);
        font-size: var(--font-size-small);
        font-weight: 700;
        letter-spacing: 0.04em;
        border: 2px solid var(--color-border);
        box-shadow: 3px 3px 0 rgba(26, 26, 46, 0.2);
    }

    .verification-badge.community-match {
        background: var(--color-memphis-mint);
        color: var(--color-text);
    }

    .verification-badge.community-only {
        background: var(--color-accent);
        color: var(--color-text);
    }

    /* ========== 页脚装饰 ========== */
    .memphis-footer-decor {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        padding: var(--space-md) 0;
        flex-wrap: wrap;
    }

    .memphis-footer-shape {
        width: 20px;
        height: 20px;
        display: inline-block;
        border: 2px solid var(--color-border);
        flex-shrink: 0;
    }

    /* ========== 响应式调整 ========== */
    @media (max-width: 640px) {
        .hero {
            padding: var(--space-lg) var(--space-md) var(--space-md);
            box-shadow: 6px 6px 0 var(--color-primary), -4px -3px 0 var(--color-memphis-teal);
        }

        .hero h1 {
            font-size: 1.8rem;
            text-shadow: 3px 3px 0 var(--color-accent), 5px 5px 0 rgba(255, 94, 140, 0.35);
        }

        .hero .memphis-hero-shape {
            transform: scale(0.7);
        }

        .day-card {
            padding: var(--space-md) var(--space-sm);
            box-shadow: 5px 5px 0 var(--color-memphis-teal);
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 10px) 100%, 0 100%, 0 8px);
        }

        .day-card h2 {
            font-size: 1.25rem;
            padding: 4px 12px;
        }

        .activity-item {
            padding-left: 40px;
        }

        .activity-item .activity-order {
            width: 24px;
            height: 24px;
            font-size: 0.7rem;
            left: 7px;
        }

        .budget-grid {
            grid-template-columns: 1fr;
        }

        .day-map {
            height: 160px;
        }
    }

    @media (max-width: 380px) {
        .hero h1 {
            font-size: 1.5rem;
        }

        .hero .subtitle {
            font-size: 0.75rem;
            padding: 3px 10px;
        }

        .hero .memphis-hero-shape.hide-mobile {
            display: none;
        }

        .day-card h2 {
            font-size: 1.1rem;
        }

        .budget-section::before,
        .xhs-section::after,
        .emergency-section::before {
            height: 4px;
        }
    }
</style>
{% endblock %}
