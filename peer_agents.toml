# ═══════════════════════════════════════════════════════════════════
# Peer Agent 注册表（独立文件）
#
# 每个 [[peer_agents]] 定义一个可委托的外部 Agent 子进程。
# ═══════════════════════════════════════════════════════════════════

[[peer_agents]]
name = "travel-planner"
base_url = "http://127.0.0.1:9100"
description = "智能旅行规划助手，支持多日深度规划，自动调研景点/天气/酒店/小红书攻略，生成完整旅行计划。"
skills = [
  { id = "plan_trip", name = "旅行规划", description = "根据目的地、日期和偏好自动规划完整的旅行行程。内部执行天气调研、小红书攻略搜索、高德景点验证、酒店推荐等多步调研，综合生成包含每日景点/餐饮/住宿/预算的完整旅行计划 JSON。提交后后台执行，通常需要 2-3 分钟，完成后系统会自动通知。", tags = ["旅行", "旅游", "规划", "行程", "攻略", "景点", "酒店"], examples = ["帮我规划北京3日游", "下周五到周日去杭州怎么玩", "7月去成都4天，喜欢美食和熊猫", "帮我规划一个北京深度文化体验的4天行程"] }
]
launcher = ["uv", "run", "python", "-m", "server"]
cwd = "peerAgent/travel-planner"
startup_timeout_s = 120
